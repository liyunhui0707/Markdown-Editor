<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Vault App</title>
    <link rel="stylesheet" href="./node_modules/@toast-ui/editor/dist/toastui-editor.css" />
    <style>
      /* ── Design tokens (Stage 5.1: Claude warm paper + iA quietness) ── */
      :root {
        /* Surfaces */
        --bg:              #f5f3ee;   /* app background — warm paper */
        --surface:         #fbfaf6;   /* editor paper (off pure white) */
        --surface-sidebar: #efede6;   /* nav + notes panel background */
        --surface-chrome:  #f0eee8;   /* topbar / status bar / toolbars */
        --surface-muted:   #f0efe9;   /* hover / pressed states */

        /* Borders */
        --border:          #e2dfd6;   /* panel / input edges */
        --border-subtle:   #e9e6dd;   /* inner dividers, hairlines */

        /* Text */
        --text:            #26241f;   /* primary ink */
        --text-muted:      #8a8678;   /* secondary labels */
        --text-faint:      #b3ad9d;   /* meta — dates, counts, kbd */

        /* Accent (brand purple, slightly desaturated) */
        --accent:          #6d4ae0;
        --accent-bg:       rgba(109, 74, 224, 0.08);
        --accent-border:   rgba(109, 74, 224, 0.28);

        /* Status (semantic) */
        --success:         #3f7a4f;
        --warning:         #a86a2e;
        --danger:          #a8423a;

        /* Typography */
        --font-ui:     "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
        --font-prose:  "iA Writer Quattro V", "Iowan Old Style", Charter, Georgia, ui-serif, serif;
        --font-mono:   "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
        --font-editor: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;

        /* Radius */
        --radius-sm: 6px;
        --radius-md: 8px;

        /* Elevation */
        --shadow-pop: 0 4px 16px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: var(--font-ui);
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        overflow: hidden;
      }

      .app-shell {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* ── Topbar — quiet, compact ─────────────────────────────────────── */

      .topbar {
        min-height: 48px;
        background: var(--surface-muted);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 16px;
        gap: 10px;
      }

      .topbar-left {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .topbar-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .topbar-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        letter-spacing: 0.02em;
      }

      .topbar-status {
        font-size: 12px;
        color: var(--text-muted);
      }

      .status-draft   { color: var(--warning); font-weight: 600; }
      .status-ready   { color: var(--success); font-weight: 600; }
      .status-saving  { color: var(--accent);  font-weight: 600; }
      .status-error   { color: var(--danger);  font-weight: 600; }

      /* Buttons and controls */
      .action-button,
      .template-select,
      .search-input {
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        border-radius: var(--radius-sm);
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 500;
      }

      .action-button {
        cursor: pointer;
        color: var(--text-muted);
      }

      .action-button:hover {
        background: var(--surface-muted);
        color: var(--text);
        border-color: var(--border);
      }

      .template-select {
        cursor: pointer;
        color: var(--text-muted);
      }

      .search-input {
        width: 100%;
        font-weight: 400;
        outline: none;
        background: var(--surface);
        font-size: 13px;
        padding: 7px 11px;
      }

      .search-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px var(--accent-bg);
      }

      .vault-path {
        font-size: 11px;
        color: var(--text-muted);
        max-width: 400px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* ── Main layout ─────────────────────────────────────────────────── */

      .main-layout {
        flex: 1;
        display: grid;
        grid-template-columns: 300px 1fr;
        min-height: 0;
      }

      /* ── Side panels (Navigation + Notes) ───────────────────────────── */

      .panel {
        border-right: 1px solid var(--border);
        background: var(--surface-sidebar);
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .panel:last-child {
        border-right: none;
      }

      /* Sidebar hidden: grid column collapses to 0px; overflow:hidden clips content.
         Must NOT use display:none — that removes the element from grid flow and
         causes the workspace to land in the 0px column, blanking the page. */
      #sidebarPanel {
        overflow: hidden;
      }

      .panel-header {
        padding: 8px 10px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border-subtle);
        background: transparent;
      }

      .panel-header-title {
        min-width: 0;
      }

      .panel-body {
        padding: 10px;
        overflow: auto;
        flex: 1;
      }

      .panel-tools {
        padding: 10px;
        border-bottom: 1px solid var(--border-subtle);
        background: transparent;
      }

      .search-meta {
        margin-top: 7px;
        font-size: 11px;
        color: var(--text-muted);
      }

      .ingest-banner {
        margin-top: 10px;
        font-size: 11px;
        color: var(--text);
        line-height: 1.5;
        background: var(--accent-bg);
        border: 1px solid rgba(124, 58, 237, 0.2);
        border-radius: 6px;
        padding: 8px 10px;
      }

      /* ── Navigation items ────────────────────────────────────────────── */

      .nav-item {
        padding: 7px 10px;
        margin-bottom: 2px;
        border-radius: 6px;
        background: transparent;
        cursor: pointer;
        border-left: 2px solid transparent;
      }

      .nav-item:hover {
        background: var(--border-subtle);
      }

      .nav-item.active {
        background: var(--accent-bg);
        border-left-color: var(--accent);
      }

      .nav-label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
      }

      .nav-item.active .nav-label {
        color: var(--accent);
        font-weight: 600;
      }

      .nav-meta {
        margin-top: 2px;
        font-size: 11px;
        color: var(--text-muted);
      }

      /* ── Note list items ─────────────────────────────────────────────── */

      .note-item {
        padding: 10px 12px;
        margin-bottom: 3px;
        border-radius: 6px;
        background: transparent;
        cursor: pointer;
        border-left: 2px solid transparent;
      }

      .note-item:hover {
        background: var(--border-subtle);
      }

      .note-item.active {
        background: var(--accent-bg);
        border-left-color: var(--accent);
      }

      /* Top row: title (flex-grows, ellipsises) + optional badge. */
      .note-row-head {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 3px;
      }

      .note-title {
        flex: 1 1 auto;
        min-width: 0;
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .note-item.active .note-title {
        color: var(--accent);
      }

      .note-meta {
        font-size: 11px;
        color: var(--text-muted);
        line-height: 1.4;
      }

      .note-snippet {
        margin-top: 5px;
        font-size: 11px;
        color: var(--text-muted);
        line-height: 1.4;
      }

      /* Type badge (right of title). Vault notes get no badge. */
      .note-badge {
        flex: 0 0 auto;
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.04em;
        padding: 1px 6px;
        border-radius: 3px;
        line-height: 1.4;
      }

      .note-badge-ai {
        background: var(--accent-bg);
        color: var(--accent);
      }

      .note-badge-draft {
        background: var(--surface-muted);
        color: var(--text-muted);
        border: 1px solid var(--border-subtle);
      }

      /* Tag chips below the meta line. Wraps if many; capped to 3 + overflow. */
      .note-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 6px;
      }

      .note-tag,
      .note-tag-overflow {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-muted);
        background: var(--surface-muted);
        padding: 1px 6px;
        border-radius: 3px;
      }

      .note-tag-overflow {
        color: var(--text-faint);
      }

      mark {
        background: var(--accent-bg);
        color: var(--accent);
        padding: 0 2px;
        border-radius: 2px;
      }

      /* ── Workspace: single unified panel ─────────────────────────────── */

      .workspace {
        display: flex;
        flex-direction: column;
        min-height: 0;
        flex: 1;
      }

      .workspace-panel {
        background: var(--surface);
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
      }

      .workspace-body {
        padding: 20px 24px;
        flex: 1;
        min-height: 0;
        overflow: auto;
        background: #ffffff;
        display: flex;
        flex-direction: column;
      }

      .editor-stack {
        display: flex;
        flex-direction: column;
        gap: 0;
        width: 100%;
        flex: 1;
        min-height: 0;
      }

      /* Title — document heading, no box */
      .title-input {
        width: 100%;
        border: none;
        border-bottom: 1px solid #e8e8e8;
        border-radius: 0;
        padding: 0 0 14px 0;
        margin-bottom: 20px;
        font-size: 28px;
        font-weight: 700;
        color: #1a1a1a;
        background: transparent;
        outline: none;
        letter-spacing: -0.01em;
      }

      .title-input:focus {
        border-bottom-color: #7c3aed;
      }

      /* Meta row — quiet, below the title */

      /* ── Live editor: document surface, no box ───────────────────────── */

      .live-editor-container {
        flex: 1;
        border: none;
        border-radius: 0;
        background: transparent;
        padding: 0;
        min-height: 0;
        cursor: text;
      }

      /* Hint shown in an empty note */
      .live-editor-empty-hint {
        padding: 4px 0;
        color: #aaaaaa;
        font-style: italic;
        font-size: 16px;
      }

      /* Each rendered Markdown block — document rhythm, no hover box */
      .live-editor-block {
        padding: 2px 0;
        border-radius: 0;
        cursor: text;
      }

      .live-editor-block:hover {
        background: transparent;
      }

      /* Write / Preview toggle — small tab bar above the editor. */
      .editor-mode-toggle {
        display: flex;
        gap: 4px;
        margin-bottom: 8px;
      }

      .mode-button {
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-muted);
        border-radius: 6px;
        padding: 4px 12px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
      }

      .mode-button:hover {
        background: var(--surface-muted);
        color: var(--text);
      }

      .mode-button-active,
      .mode-button-active:hover {
        background: var(--accent-bg);
        border-color: var(--accent);
        color: var(--accent);
      }

      /* HybridWriteView pane — the Write surface the user actually edits. */
      .live-editor-container {
        display: flex;
        flex-direction: column;
      }

      .hybrid-write-pane {
        flex: 1;
        min-height: 0;
        overflow: auto;
      }

      .hybrid-write-pane.is-hidden {
        display: none;
      }

      /* Active block textarea — strip native textarea chrome so selecting
         text shows only the normal browser selection highlight (no border
         box, focus ring, drop shadow, or resize grip). Inherit the editor
         font / color / line-height so the active block visually matches the
         surrounding rendered blocks. */
      .hybrid-active-textarea {
        width: 100%;
        box-sizing: border-box;
        border: 0;
        outline: none;
        box-shadow: none;
        background: transparent;
        resize: none;
        font: inherit;
        color: inherit;
        line-height: inherit;
        padding: 0;
        margin: 0;
        overflow-y: hidden;
      }

      /* Internal wrapper inside HybridWriteView. Stretching it to full
         height + flex column lets the tail affordance absorb whatever
         vertical space is left below the rendered blocks, so clicking
         anywhere in the empty Write area below a short document still
         lands on the click target. */
      .hybrid-write-inner {
        min-height: 100%;
        display: flex;
        flex-direction: column;
      }

      /* Click target below the last block: lets the user start a new
         paragraph without having to edit existing text first. flex: 1
         absorbs the remaining vertical space inside .hybrid-write-inner;
         min-height keeps a usable click area on tall documents. */
      .hybrid-tail-affordance {
        flex: 1;
        min-height: 2em;
        cursor: text;
      }

      /* Toast UI mount — hosts the Preview renderer. Hidden by default; shown
         when Preview mode is active via .is-visible. The Toast UI toolbar and
         mode-switch are inert here (HybridWriteView is the active write
         surface), so we hide them via CSS. The internal Markdown/Preview
         tab bar is also hidden — our own toggle controls mode. */
      .toast-preview-mount {
        display: none;
        flex: 1;
        min-height: 0;
      }

      .toast-preview-mount.is-visible {
        display: block;
      }

      /* Hide only inert Toast UI controls. Do NOT hide
         .toastui-editor-md-tab-style — that wrapper contains the preview
         pane itself; hiding it would make Preview unreachable. */
      .toast-preview-mount .toastui-editor-toolbar,
      .toast-preview-mount .toastui-editor-mode-switch,
      .toast-preview-mount .toastui-editor-md-tab-container {
        display: none !important;
      }

      /* Active textarea — fills the full editor area */
      .live-editor-active-textarea {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        border: none;
        border-left: 3px solid #7c3aed;
        border-radius: 0;
        padding: 2px 0 2px 14px;
        font-size: 15px;
        line-height: 1.8;
        font-family: var(--font-editor);
        background: transparent;
        color: #2d2d2d;
        box-shadow: none;
        resize: none;
        outline: none;
        display: block;
      }

      /* ── Markdown typography — readable, document-grade ─────────────── */

      .preview-markdown {
        font-family: var(--font-prose);
        font-size: 16px;
        line-height: 1.8;
        color: #2d2d2d;
      }

      .preview-markdown h1 {
        font-size: 1.75em;
        font-weight: 700;
        color: #1a1a1a;
        margin: 0 0 0.4em 0;
        padding-bottom: 0.3em;
        border-bottom: 1px solid #ebebeb;
        letter-spacing: -0.02em;
      }

      .preview-markdown h2 {
        font-size: 1.35em;
        font-weight: 600;
        color: #1a1a1a;
        margin: 0 0 0.3em 0;
      }

      .preview-markdown h3 {
        font-size: 1.1em;
        font-weight: 600;
        color: #333;
        margin: 0 0 0.3em 0;
      }

      .preview-markdown p {
        margin: 0 0 1.1em 0;
      }

      .preview-markdown ul,
      .preview-markdown ol {
        padding-left: 1.6em;
        margin: 0 0 1.1em 0;
      }

      .preview-markdown li {
        margin-bottom: 0.35em;
      }

      .preview-markdown strong {
        font-weight: 600;
        color: #1a1a1a;
      }

      .preview-markdown a {
        color: #7c3aed;
        text-decoration: none;
      }

      .preview-markdown a:hover {
        text-decoration: underline;
      }

      /* Inline code */
      .preview-markdown code {
        background: #f5f2ff;
        border: 1px solid #e4dcff;
        padding: 1px 6px;
        border-radius: 4px;
        font-size: 0.88em;
        font-family: var(--font-mono);
        color: #6d28d9;
      }

      /* Code block */
      .preview-markdown pre {
        background: #f8f8f6;
        border: 1px solid #e8e8e4;
        padding: 16px 20px;
        border-radius: 8px;
        overflow-x: auto;
        margin: 0 0 1.1em 0;
      }

      .preview-markdown pre code {
        background: transparent;
        border: none;
        padding: 0;
        color: #2d2d2d;
        font-size: 0.9em;
        font-family: var(--font-mono);
      }

      /* Blockquote */
      .preview-markdown blockquote {
        border-left: 3px solid #7c3aed;
        background: #fdfcff;
        padding: 6px 16px;
        margin: 0 0 1.1em 0;
        color: #666;
        border-radius: 0 4px 4px 0;
      }

      .preview-markdown hr {
        border: none;
        border-top: 1px solid #ebebeb;
        margin: 2em 0;
      }

      /* ── Overflow menu (···) ─────────────────────────────────────────── */

      .topbar-more-wrapper {
        position: relative;
      }

      .more-menu {
        display: none;
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-pop);
        padding: 6px;
        z-index: 100;
        min-width: 190px;
        flex-direction: column;
        gap: 2px;
      }

      .more-menu.open {
        display: flex;
      }

      .more-menu .action-button {
        width: 100%;
        text-align: left;
        border: none;
        border-radius: 5px;
        padding: 8px 12px;
        background: transparent;
        font-weight: 500;
        color: var(--text);
      }

      .more-menu .action-button:hover {
        background: var(--surface-muted);
      }

      .more-menu-separator {
        height: 1px;
        background: var(--border-subtle);
        margin: 4px 2px;
      }

      .action-button--destructive {
        color: var(--danger) !important;
      }

      .action-button--destructive:hover {
        background: #fff1f2 !important;
      }

      /* ── Top chrome removal ──────────────────────────────────────────── */

      /* Panel headers become invisible rails — only the toggle icon shows */
      .panel-header {
        padding: 4px 6px;
        border-bottom: none;
        background: transparent;
        min-height: 0;
      }

      .panel-header-title {
        display: none;
      }

      /* Workspace panel-header hidden — Edit/Done moved to note-actions */
      .workspace-panel > .panel-header {
        display: none;
      }

      /* ── Note actions bar ────────────────────────────────────────────── */

      .note-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 5px 10px;
        border-bottom: 1px solid var(--border-subtle);
        background: var(--surface);
        gap: 6px;
        flex-shrink: 0;
      }

      .note-actions-left {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .note-actions-right {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      /* ── Sidebar toggle ──────────────────────────────────────────────── */

      .sidebar-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--surface);
        color: var(--text-muted);
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        flex-shrink: 0;
        transition: color 0.15s, background 0.15s;
      }

      .sidebar-toggle:hover {
        background: var(--surface-muted);
        color: var(--text);
        border-color: var(--border);
      }

      /* Filter section separator inside sidebar */
      .sidebar-divider {
        height: 1px;
        background: var(--border-subtle);
        margin: 4px 0;
      }

      /* ── Status bar footer ───────────────────────────────────────────── */

      .status-bar {
        height: 24px;
        background: var(--surface-muted);
        border-top: 1px solid var(--border-subtle);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 12px;
        font-size: 11px;
        color: var(--text-muted);
        flex-shrink: 0;
      }

      .status-bar-path {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 40%;
      }

      /* Read-only document readouts in the centre of the status bar.
         min-width:0 + overflow:hidden lets the cluster shrink at narrow
         widths instead of pushing the right-hand status pill out of view. */
      .status-bar-counts {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-faint);
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      .status-bar-counts .sep {
        color: var(--border);
      }

      /* ── Toast UI Editor integration ─────────────────────────────────── */

      /* Force the editor wrapper to fill the live-editor-container */
      .toastui-editor-defaultUI {
        height: 100%;
        display: flex;
        flex-direction: column;
        border: none;
      }

      /* Scrollable content area fills remaining space */
      .toastui-editor-main {
        flex: 1;
        min-height: 0;
        overflow: auto;
      }

      /* ProseMirror content area stretches to fill */
      .ProseMirror {
        min-height: 100%;
        padding: 4px 2px;
      }

      /* Blend toolbar with app palette */
      .toastui-editor-toolbar {
        border-bottom: 1px solid var(--border-subtle);
        background: var(--surface);
      }

      /* Remove default outer border */
      .toastui-editor-defaultUI .toastui-editor-main {
        border: none;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">

      <main id="mainLayout" class="main-layout">
        <!-- Unified sidebar: filters + search + note list -->
        <aside id="sidebarPanel" class="panel">
          <div class="panel-header">
            <span class="panel-header-title">Notes</span>
          </div>
          <div class="panel-body" style="padding:8px 8px 4px;">
            <div class="nav-item active" data-filter="all" id="filterAll">
              <div class="nav-label">All Notes</div>
              <div class="nav-meta" id="filterAllMeta">0 notes</div>

    <script>
      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function escapeRegExp(text) {
        return String(text).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      }

      function normalizeTags(value) {
        if (!value) return [];

        if (Array.isArray(value)) {
          return value.map((item) => String(item).trim()).filter(Boolean);
        }

        return String(value)
          .split(',')
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function normalizeSearchText(value) {
        return String(value || '').toLowerCase();
      }

      /* Build a metadata text block from structured frontmatter values. */
      function serializeMetaPrefix(frontmatter) {
        const tags   = normalizeTags(frontmatter?.tags).join(', ');
        const source = (frontmatter?.source || '').trim();
        const lines  = [];
        if (tags)   lines.push(`Tags: ${tags}`);
        if (source) lines.push(`Source: ${source}`);
        return lines.join('\n');
      }

      /* Parse the metadata block from the very top of the body text.
         Stops at the first line that is not Tags:/Source:.
         Returns { tags, source, cleanBody } — cleanBody has the meta lines removed. */
      function stripMetaPrefix(fullText) {
        const lines = (fullText || '').split('\n');
        let tags = [], source = '', i = 0;
        while (i < lines.length) {
          const tm = lines[i].match(/^Tags:\s*(.*)/i);
          const sm = lines[i].match(/^Source:\s*(.*)/i);
          if (tm)      { tags   = normalizeTags(tm[1]); i++; }
          else if (sm) { source = sm[1].trim();          i++; }
          else break;
        }
        while (i < lines.length && lines[i].trim() === '') i++;
        return { tags, source, cleanBody: lines.slice(i).join('\n') };
      }

      function highlightText(text, query) {
        if (!query) {
          return escapeHtml(text);
        }

        const safeText = String(text || '');
        const regex = new RegExp(`(${escapeRegExp(query)})`, 'ig');
        return escapeHtml(safeText).replace(regex, '<mark>$1</mark>');
      }

      function getSnippetFromText(text, query, radius = 55) {
        const raw = String(text || '').replace(/\s+/g, ' ').trim();

        if (!raw) {
          return '';
        }

        if (!query) {
          return raw.slice(0, 110);
        }

        const lowerRaw = raw.toLowerCase();
        const lowerQuery = query.toLowerCase();
        const matchIndex = lowerRaw.indexOf(lowerQuery);

        if (matchIndex === -1) {
          return raw.slice(0, 110);
        }

        const start = Math.max(0, matchIndex - radius);
        const end = Math.min(raw.length, matchIndex + lowerQuery.length + radius);
        let snippet = raw.slice(start, end);

        if (start > 0) {
          snippet = `…${snippet}`;
        }

        if (end < raw.length) {
          snippet = `${snippet}…`;
        }

        return snippet;
      }

      function buildSearchCorpus(note) {
        const tags = normalizeTags(note.frontmatter?.tags).join(', ');
        const sourceValue = note.frontmatter?.source || '';
        return [
          note.title || '',
          note.body || '',
          tags,
          sourceValue,
          note.relativePath || '',
          note.fileName || ''
        ].join('\n');
      }

      function computeSearchResult(note, query) {
        const normalizedQuery = normalizeSearchText(query);
        const corpus = buildSearchCorpus(note);
        const normalizedCorpus = normalizeSearchText(corpus);

        if (!normalizedQuery) {
          return {
            note,
            score: 0,
            snippet: '',
            matchField: ''
          };
        }

        if (!normalizedCorpus.includes(normalizedQuery)) {
          return null;
        }

        const title = normalizeSearchText(note.title);
        const body = normalizeSearchText(note.body);
        const tags = normalizeSearchText(normalizeTags(note.frontmatter?.tags).join(', '));
        const sourceValue = normalizeSearchText(note.frontmatter?.source || '');
        const relativePath = normalizeSearchText(note.relativePath || '');
        const fileName = normalizeSearchText(note.fileName || '');

        let score = 0;
        let snippet = '';
        let matchField = '';

        if (title.includes(normalizedQuery)) {
          score += 50;
          snippet = getSnippetFromText(note.title, query, 30);
          matchField = 'title';
        }

        if (tags.includes(normalizedQuery)) {
          score += 35;
          if (!snippet) {
            snippet = getSnippetFromText(normalizeTags(note.frontmatter?.tags).join(', '), query, 30);
            matchField = 'tags';
          }
        }

        if (sourceValue.includes(normalizedQuery)) {
          score += 30;
          if (!snippet) {
            snippet = getSnippetFromText(note.frontmatter?.source || '', query, 30);
            matchField = 'source';
          }
        }

        if (relativePath.includes(normalizedQuery) || fileName.includes(normalizedQuery)) {
          score += 25;
          if (!snippet) {
            snippet = getSnippetFromText(note.relativePath || note.fileName || '', query, 40);
            matchField = 'path';
          }
        }

        if (body.includes(normalizedQuery)) {
          score += 20;
          if (!snippet) {
            snippet = getSnippetFromText(note.body, query, 60);
            matchField = 'body';
          }
        }

        if (!snippet) {
          snippet = getSnippetFromText(note.body || note.title, query, 60);
        }

        return {
          note,
          score,
          snippet,
          matchField
        };
      }

      const templates = {

          frontmatter: {

        daily: {

## Idea
Write the core idea here.

## Why it matters
-

## Next steps
- `,
          frontmatter: {
