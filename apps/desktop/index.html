<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Vault App</title>
    <style>
      /* ── Design tokens ───────────────────────────────────────────────── */
      :root {
        --bg:              #f5f4f1;   /* warm off-white, like Obsidian's default */
        --surface:         #ffffff;   /* panel / card surface */
        --surface-muted:   #f0efe9;   /* sidebar background */
        --surface-sidebar: #f2f1ec;   /* nav + notes panel background */
        --border:          #e5e3dc;   /* standard border */
        --border-subtle:   #edecea;   /* very quiet dividers */
        --text:            #2d2d2d;   /* body text */
        --text-muted:      #999690;   /* secondary / meta text */
        --accent:          #7c3aed;   /* purple — used sparingly */
        --accent-bg:       rgba(124, 58, 237, 0.07);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        overflow: hidden;
      }

      .app-shell {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* ── Topbar — quiet, compact ─────────────────────────────────────── */

      .topbar {
        min-height: 48px;
        background: var(--surface-muted);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 16px;
        gap: 10px;
      }

      .topbar-left {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .topbar-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .topbar-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        letter-spacing: 0.02em;
      }

      .topbar-status {
        font-size: 12px;
        color: var(--text-muted);
      }

      .status-draft   { color: #92400e; font-weight: 600; }
      .status-ready   { color: #166534; font-weight: 600; }
      .status-saving  { color: var(--accent); font-weight: 600; }
      .status-error   { color: #991b1b; font-weight: 600; }

      /* Buttons and controls */
      .action-button,
      .template-select,
      .search-input {
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        border-radius: 7px;
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 500;
      }

      .action-button {
        cursor: pointer;
        color: var(--text-muted);
      }

      .action-button:hover {
        background: var(--surface-muted);
        color: var(--text);
        border-color: var(--border);
      }

      .template-select {
        cursor: pointer;
        color: var(--text-muted);
      }

      .search-input {
        width: 100%;
        font-weight: 400;
        outline: none;
        background: var(--surface);
        font-size: 13px;
        padding: 7px 11px;
      }

      .search-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px var(--accent-bg);
      }

      .vault-path {
        font-size: 11px;
        color: var(--text-muted);
        max-width: 400px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* ── Main layout ─────────────────────────────────────────────────── */

      .main-layout {
        flex: 1;
        display: grid;
        grid-template-columns: 168px 220px 1fr;
        min-height: 0;
      }

      /* ── Side panels (Navigation + Notes) ───────────────────────────── */

      .panel {
        border-right: 1px solid var(--border);
        background: var(--surface-sidebar);
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .panel:last-child {
        border-right: none;
      }

      .panel-header {
        padding: 12px 14px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border-subtle);
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .panel-header-title {
        min-width: 0;
      }

      .panel-toggle {
        border: none;
        background: transparent;
        color: var(--text-muted);
        cursor: pointer;
        padding: 2px 5px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        line-height: 1;
      }

      .panel-toggle:hover {
        background: var(--border-subtle);
        color: var(--text);
      }

      .panel.collapsed .panel-body,
      .panel.collapsed .panel-tools {
        display: none;
      }

      .panel.collapsed .panel-header {
        justify-content: center;
        padding: 12px 8px;
      }

      .panel.collapsed .panel-header-title {
        display: none;
      }

      .panel-body {
        padding: 10px;
        overflow: auto;
        flex: 1;
      }

      .panel-tools {
        padding: 10px;
        border-bottom: 1px solid var(--border-subtle);
        background: transparent;
      }

      .search-meta {
        margin-top: 7px;
        font-size: 11px;
        color: var(--text-muted);
      }

      .ingest-banner {
        margin-top: 10px;
        font-size: 11px;
        color: var(--text);
        line-height: 1.5;
        background: var(--accent-bg);
        border: 1px solid rgba(124, 58, 237, 0.2);
        border-radius: 6px;
        padding: 8px 10px;
      }

      /* ── Navigation items ────────────────────────────────────────────── */

      .nav-item {
        padding: 7px 10px;
        margin-bottom: 2px;
        border-radius: 6px;
        background: transparent;
        cursor: pointer;
        border-left: 2px solid transparent;
      }

      .nav-item:hover {
        background: var(--border-subtle);
      }

      .nav-item.active {
        background: var(--accent-bg);
        border-left-color: var(--accent);
      }

      .nav-label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
      }

      .nav-item.active .nav-label {
        color: var(--accent);
        font-weight: 600;
      }

      .nav-meta {
        margin-top: 2px;
        font-size: 11px;
        color: var(--text-muted);
      }

      /* ── Note list items ─────────────────────────────────────────────── */

      .note-item {
        padding: 7px 10px;
        margin-bottom: 2px;
        border-radius: 6px;
        background: transparent;
        cursor: pointer;
        border-left: 2px solid transparent;
      }

      .note-item:hover {
        background: var(--border-subtle);
      }

      .note-item.active {
        background: var(--accent-bg);
        border-left-color: var(--accent);
      }

      .note-title {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 3px;
        color: var(--text);
      }

      .note-item.active .note-title {
        color: var(--accent);
      }

      .note-meta {
        font-size: 11px;
        color: var(--text-muted);
        line-height: 1.4;
      }

      .note-snippet {
        margin-top: 5px;
        font-size: 11px;
        color: var(--text-muted);
        line-height: 1.4;
      }

      mark {
        background: rgba(124, 58, 237, 0.12);
        color: var(--accent);
        padding: 0 2px;
        border-radius: 2px;
      }

      /* ── Workspace: single unified panel ─────────────────────────────── */

      .workspace {
        display: flex;
        flex-direction: column;
        min-height: 0;
        flex: 1;
      }

      .workspace-panel {
        background: var(--surface);
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
      }

      .workspace-body {
        padding: 40px 48px;
        flex: 1;
        min-height: 0;
        overflow: auto;
        background: #ffffff;
      }

      /* Centered document column — max 720px like Obsidian */
      .editor-stack {
        display: flex;
        flex-direction: column;
        gap: 0;
        max-width: 720px;
        margin: 0 auto;
        width: 100%;
        height: 100%;
      }

      /* Title — document heading, no box */
      .title-input {
        width: 100%;
        border: none;
        border-bottom: 1px solid #e8e8e8;
        border-radius: 0;
        padding: 0 0 14px 0;
        margin-bottom: 20px;
        font-size: 28px;
        font-weight: 700;
        color: #1a1a1a;
        background: transparent;
        outline: none;
        letter-spacing: -0.01em;
      }

      .title-input:focus {
        border-bottom-color: #7c3aed;
      }

      /* Meta row — quiet, below the title */
      .meta-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 28px;
        padding-bottom: 20px;
        border-bottom: 1px solid #f0f0f0;
      }

      .meta-label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #aaaaaa;
        margin-bottom: 5px;
      }

      .meta-input {
        width: 100%;
        border: 1px solid #ebebeb;
        border-radius: 6px;
        padding: 7px 10px;
        font-size: 13px;
        color: #444;
        background: #fafafa;
        outline: none;
      }

      .meta-input:focus {
        border-color: #7c3aed;
        box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.1);
      }

      /* ── Live editor: document surface, no box ───────────────────────── */

      .live-editor-container {
        flex: 1;
        border: none;
        border-radius: 0;
        background: transparent;
        padding: 0;
        overflow-y: auto;
        min-height: 0;
        cursor: text;
      }

      /* Hint shown in an empty note */
      .live-editor-empty-hint {
        padding: 4px 0;
        color: #aaaaaa;
        font-style: italic;
        font-size: 16px;
      }

      /* Each rendered Markdown block — document rhythm, no hover box */
      .live-editor-block {
        padding: 2px 0;
        border-radius: 0;
        cursor: text;
      }

      .live-editor-block:hover {
        background: transparent;
      }

      /* Active textarea — no box, just a purple left accent line */
      .live-editor-active-textarea {
        width: 100%;
        border: none;
        border-left: 3px solid #7c3aed;
        border-radius: 0;
        padding: 2px 0 2px 14px;
        font-size: 15px;
        line-height: 1.8;
        font-family: "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
        background: #fdfcff;
        color: #2d2d2d;
        box-shadow: none;
        resize: none;
        outline: none;
        display: block;
      }

      /* ── Markdown typography — readable, document-grade ─────────────── */

      .preview-markdown {
        font-size: 16px;
        line-height: 1.8;
        color: #2d2d2d;
      }

      .preview-markdown h1 {
        font-size: 1.75em;
        font-weight: 700;
        color: #1a1a1a;
        margin: 0 0 0.4em 0;
        padding-bottom: 0.3em;
        border-bottom: 1px solid #ebebeb;
        letter-spacing: -0.02em;
      }

      .preview-markdown h2 {
        font-size: 1.35em;
        font-weight: 600;
        color: #1a1a1a;
        margin: 0 0 0.3em 0;
      }

      .preview-markdown h3 {
        font-size: 1.1em;
        font-weight: 600;
        color: #333;
        margin: 0 0 0.3em 0;
      }

      .preview-markdown p {
        margin: 0 0 1.1em 0;
      }

      .preview-markdown ul,
      .preview-markdown ol {
        padding-left: 1.6em;
        margin: 0 0 1.1em 0;
      }

      .preview-markdown li {
        margin-bottom: 0.35em;
      }

      .preview-markdown strong {
        font-weight: 600;
        color: #1a1a1a;
      }

      .preview-markdown a {
        color: #7c3aed;
        text-decoration: none;
      }

      .preview-markdown a:hover {
        text-decoration: underline;
      }

      /* Inline code */
      .preview-markdown code {
        background: #f5f2ff;
        border: 1px solid #e4dcff;
        padding: 1px 6px;
        border-radius: 4px;
        font-size: 0.88em;
        font-family: "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
        color: #6d28d9;
      }

      /* Code block */
      .preview-markdown pre {
        background: #f8f8f6;
        border: 1px solid #e8e8e4;
        padding: 16px 20px;
        border-radius: 8px;
        overflow-x: auto;
        margin: 0 0 1.1em 0;
      }

      .preview-markdown pre code {
        background: transparent;
        border: none;
        padding: 0;
        color: #2d2d2d;
        font-size: 0.9em;
      }

      /* Blockquote */
      .preview-markdown blockquote {
        border-left: 3px solid #7c3aed;
        background: #fdfcff;
        padding: 6px 16px;
        margin: 0 0 1.1em 0;
        color: #666;
        border-radius: 0 4px 4px 0;
      }

      .preview-markdown hr {
        border: none;
        border-top: 1px solid #ebebeb;
        margin: 2em 0;
      }

      /* ── Overflow menu (···) ─────────────────────────────────────────── */

      .topbar-more-wrapper {
        position: relative;
      }

      .more-menu {
        display: none;
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.10);
        padding: 6px;
        z-index: 100;
        min-width: 190px;
        flex-direction: column;
        gap: 2px;
      }

      .more-menu.open {
        display: flex;
      }

      .more-menu .action-button {
        width: 100%;
        text-align: left;
        border: none;
        border-radius: 5px;
        padding: 8px 12px;
        background: transparent;
        font-weight: 500;
        color: var(--text);
      }

      .more-menu .action-button:hover {
        background: var(--surface-muted);
      }

      .more-menu-separator {
        height: 1px;
        background: var(--border-subtle);
        margin: 4px 2px;
      }

      .action-button--destructive {
        color: #991b1b !important;
      }

      .action-button--destructive:hover {
        background: #fff1f2 !important;
      }

      /* ── Top chrome removal ──────────────────────────────────────────── */

      /* Panel headers become invisible rails — only the toggle icon shows */
      .panel-header {
        padding: 4px 6px;
        border-bottom: none;
        background: transparent;
        min-height: 0;
      }

      .panel-header-title {
        display: none;
      }

      /* Workspace panel-header hidden — Edit/Done moved to note-actions */
      .workspace-panel > .panel-header {
        display: none;
      }

      /* ── Note actions bar ────────────────────────────────────────────── */

      .note-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 5px 10px;
        border-bottom: 1px solid var(--border-subtle);
        background: var(--surface);
        gap: 6px;
        flex-shrink: 0;
      }

      .note-actions-left {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .note-actions-right {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      /* ── Status bar footer ───────────────────────────────────────────── */

      .status-bar {
        height: 24px;
        background: var(--surface-muted);
        border-top: 1px solid var(--border-subtle);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 12px;
        font-size: 11px;
        color: var(--text-muted);
        flex-shrink: 0;
      }

      .status-bar-path {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 60%;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">

      <main id="mainLayout" class="main-layout">
        <aside id="navigationPanel" class="panel">
          <div class="panel-header">
            <span class="panel-header-title">Navigation</span>
            <button
              id="toggleNavigationButton"
              class="panel-toggle"
              type="button"
              aria-label="Hide Navigation"
            >
              &lt;
            </button>
          </div>
          <div class="panel-body">
            <div class="nav-item active" data-filter="all" id="filterAll">
              <div class="nav-label">All Notes</div>
              <div class="nav-meta" id="filterAllMeta">0 notes</div>
            </div>

            <div class="nav-item" data-filter="ai" id="filterAi">
              <div class="nav-label">AI Imports</div>
              <div class="nav-meta" id="filterAiMeta">0 notes</div>
            </div>

            <div class="nav-item" data-filter="drafts" id="filterDrafts">
              <div class="nav-label">Drafts</div>
              <div class="nav-meta" id="filterDraftsMeta">0 notes</div>
            </div>

            <div class="nav-item" data-filter="vault" id="filterVault">
              <div class="nav-label">Vault Files</div>
              <div class="nav-meta" id="filterVaultMeta">0 notes</div>
            </div>
          </div>
        </aside>

        <section id="notesPanel" class="panel">
          <div class="panel-header">
            <span class="panel-header-title">Notes</span>
            <button
              id="toggleNotesButton"
              class="panel-toggle"
              type="button"
              aria-label="Hide Notes"
            >
              &lt;
            </button>
          </div>
          <div class="panel-tools">
            <input
              id="searchInput"
              class="search-input"
              type="text"
              placeholder="Search notes by title, body, tags, source, or path..."
            />
            <div id="searchMeta" class="search-meta">Search all visible notes.</div>
<div id="ingestBanner" class="ingest-banner" style="display: none;"></div>
          </div>
          <div id="noteList" class="panel-body"></div>
        </section>

        <!-- Single unified editor panel — no more split Editor / Preview -->
        <section class="workspace">
          <div class="workspace-panel">
            <div class="note-actions">
              <div class="note-actions-left">
                <select id="templateSelect" class="template-select">
                  <option value="blank">Blank Note</option>
                  <option value="daily">Daily Note</option>
                  <option value="meeting">Meeting Note</option>
                  <option value="idea">Idea Note</option>
                </select>
                <button id="newNoteButton" class="action-button">New Note</button>
                <button id="saveNoteButton" class="action-button">Save Note</button>
                <div class="topbar-more-wrapper">
                  <button
                    id="moreButton"
                    class="action-button"
                    aria-haspopup="true"
                    aria-expanded="false"
                    aria-controls="moreMenu"
                  >···</button>
                  <div id="moreMenu" class="more-menu" role="menu">
                    <button id="chooseVaultButton" class="action-button" role="menuitem">Choose Vault</button>
                    <button id="seedDemoVaultButton" class="action-button" role="menuitem">Create Demo Vault</button>
                    <button id="loadVaultButton" class="action-button" role="menuitem">Load Vault</button>
                    <div class="more-menu-separator"></div>
                    <button id="deleteNoteButton" class="action-button action-button--destructive" role="menuitem">Delete Note</button>
                  </div>
                </div>
              </div>
              <div class="note-actions-right">
                <button id="editToggleButton" class="action-button" style="font-size:12px;padding:4px 10px;">Edit</button>
              </div>
            </div>
            <div class="workspace-body">
              <div class="editor-stack">
                <input
                  id="titleInput"
                  class="title-input"
                  type="text"
                  placeholder="Untitled note"
                />

                <div class="meta-row">
                  <div>
                    <label class="meta-label" for="tagsInput">Tags (comma-separated)</label>
                    <input
                      id="tagsInput"
                      class="meta-input"
                      type="text"
                      placeholder="ai, notes, project"
                    />
                  </div>

                  <div>
                    <label class="meta-label" for="sourceInput">Source</label>
                    <input
                      id="sourceInput"
                      class="meta-input"
                      type="text"
                      placeholder="claude, codex, manual"
                    />
                  </div>
                </div>

                <!-- The live editor renders Markdown inline here.
                     Click any block to edit it; blur to return to the rendered view. -->
                <div id="liveEditorContainer" class="live-editor-container"></div>
              </div>
            </div>
          </div>
        </section>
      </main>

      <footer class="status-bar">
        <div id="vaultPathText" class="status-bar-path">Vault: not selected</div>
        <div id="statusText" class="status-bar-status status-ready">Ready</div>
      </footer>
    </div>

    <script src="./node_modules/marked/lib/marked.umd.js"></script>
    <script src="./lib/live-editor.js"></script>
    <script src="./lib/LiveEditor.js"></script>

    <script>
      marked.use({ breaks: false });

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function escapeRegExp(text) {
        return String(text).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      }

      function normalizeTags(value) {
        if (!value) return [];

        if (Array.isArray(value)) {
          return value.map((item) => String(item).trim()).filter(Boolean);
        }

        return String(value)
          .split(',')
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function normalizeSearchText(value) {
        return String(value || '').toLowerCase();
      }

      function highlightText(text, query) {
        if (!query) {
          return escapeHtml(text);
        }

        const safeText = String(text || '');
        const regex = new RegExp(`(${escapeRegExp(query)})`, 'ig');
        return escapeHtml(safeText).replace(regex, '<mark>$1</mark>');
      }

      function getSnippetFromText(text, query, radius = 55) {
        const raw = String(text || '').replace(/\s+/g, ' ').trim();

        if (!raw) {
          return '';
        }

        if (!query) {
          return raw.slice(0, 110);
        }

        const lowerRaw = raw.toLowerCase();
        const lowerQuery = query.toLowerCase();
        const matchIndex = lowerRaw.indexOf(lowerQuery);

        if (matchIndex === -1) {
          return raw.slice(0, 110);
        }

        const start = Math.max(0, matchIndex - radius);
        const end = Math.min(raw.length, matchIndex + lowerQuery.length + radius);
        let snippet = raw.slice(start, end);

        if (start > 0) {
          snippet = `…${snippet}`;
        }

        if (end < raw.length) {
          snippet = `${snippet}…`;
        }

        return snippet;
      }

      function buildSearchCorpus(note) {
        const tags = normalizeTags(note.frontmatter?.tags).join(', ');
        const sourceValue = note.frontmatter?.source || '';
        return [
          note.title || '',
          note.body || '',
          tags,
          sourceValue,
          note.relativePath || '',
          note.fileName || ''
        ].join('\n');
      }

      function computeSearchResult(note, query) {
        const normalizedQuery = normalizeSearchText(query);
        const corpus = buildSearchCorpus(note);
        const normalizedCorpus = normalizeSearchText(corpus);

        if (!normalizedQuery) {
          return {
            note,
            score: 0,
            snippet: '',
            matchField: ''
          };
        }

        if (!normalizedCorpus.includes(normalizedQuery)) {
          return null;
        }

        const title = normalizeSearchText(note.title);
        const body = normalizeSearchText(note.body);
        const tags = normalizeSearchText(normalizeTags(note.frontmatter?.tags).join(', '));
        const sourceValue = normalizeSearchText(note.frontmatter?.source || '');
        const relativePath = normalizeSearchText(note.relativePath || '');
        const fileName = normalizeSearchText(note.fileName || '');

        let score = 0;
        let snippet = '';
        let matchField = '';

        if (title.includes(normalizedQuery)) {
          score += 50;
          snippet = getSnippetFromText(note.title, query, 30);
          matchField = 'title';
        }

        if (tags.includes(normalizedQuery)) {
          score += 35;
          if (!snippet) {
            snippet = getSnippetFromText(normalizeTags(note.frontmatter?.tags).join(', '), query, 30);
            matchField = 'tags';
          }
        }

        if (sourceValue.includes(normalizedQuery)) {
          score += 30;
          if (!snippet) {
            snippet = getSnippetFromText(note.frontmatter?.source || '', query, 30);
            matchField = 'source';
          }
        }

        if (relativePath.includes(normalizedQuery) || fileName.includes(normalizedQuery)) {
          score += 25;
          if (!snippet) {
            snippet = getSnippetFromText(note.relativePath || note.fileName || '', query, 40);
            matchField = 'path';
          }
        }

        if (body.includes(normalizedQuery)) {
          score += 20;
          if (!snippet) {
            snippet = getSnippetFromText(note.body, query, 60);
            matchField = 'body';
          }
        }

        if (!snippet) {
          snippet = getSnippetFromText(note.body || note.title, query, 60);
        }

        return {
          note,
          score,
          snippet,
          matchField
        };
      }

      const templates = {

          title: 'Untitled note',
          body: '',
          frontmatter: {

      const titleInput             = document.getElementById('titleInput');

      const liveEditorContainer    = document.getElementById('liveEditorContainer');
      const searchInput            = document.getElementById('searchInput');
      const searchMeta             = document.getElementById('searchMeta');
      const ingestBanner           = document.getElementById('ingestBanner');
      const statusText             = document.getElementById('statusText');
      const vaultPathText          = document.getElementById('vaultPathText');
      const chooseVaultButton      = document.getElementById('chooseVaultButton');
      const seedDemoVaultButton    = document.getElementById('seedDemoVaultButton');
      const templateSelect         = document.getElementById('templateSelect');
      const newNoteButton          = document.getElementById('newNoteButton');
      const saveNoteButton         = document.getElementById('saveNoteButton');
      const deleteNoteButton       = document.getElementById('deleteNoteButton');
      const loadVaultButton        = document.getElementById('loadVaultButton');
      const toggleNavigationButton = document.getElementById('toggleNavigationButton');
      const toggleNotesButton      = document.getElementById('toggleNotesButton');
      const editToggleButton       = document.getElementById('editToggleButton');
      const noteList               = document.getElementById('noteList');
      const mainLayout             = document.getElementById('mainLayout');
      const navigationPanel        = document.getElementById('navigationPanel');
      const notesPanel             = document.getElementById('notesPanel');

      const filterAll       = document.getElementById('filterAll');
      const filterAi        = document.getElementById('filterAi');
      const filterDrafts    = document.getElementById('filterDrafts');
      const filterVault     = document.getElementById('filterVault');
      const filterAllMeta   = document.getElementById('filterAllMeta');
      const filterAiMeta    = document.getElementById('filterAiMeta');
      const filterDraftsMeta = document.getElementById('filterDraftsMeta');
      const filterVaultMeta = document.getElementById('filterVaultMeta');

      let stopVaultWatcher        = null;
      let currentVaultPath        = '';
      let currentFilter           = 'all';
      let currentSearchQuery      = '';
      let lastIngestedRelativePath = '';
      let lastIngestedAt          = '';
      let isNavigationHidden      = false;
      let isNotesHidden           = false;
      let liveEditorInstance      = null;
      let liveEditorLastNoteId    = ''; // tracks which note is loaded so we don't reset on every render
      let isEditMode              = false;

      let notes = [
        {
          id: 'draft:1',
          title: 'Welcome to Markdown Vault App',
          body: `# Day 25

Today the app reacts better to real external MCP ingests.

## Goal
- auto-refresh
- switch to AI Imports
- focus the new imported note`,
          meta: 'Unsaved draft',
          fileName: '',
          relativePath: '',
          source: 'draft',
          aiImported: false,
          frontmatter: {
            tags: ['mcp', 'ingest'],
            source: 'manual'
          }
        }
      ];
      let selectedNoteId = 'draft:1';
      let nextDraftId = 2;

      function getSelectedNote() {
        return notes.find((note) => note.id === selectedNoteId);
      }

      function setStatus(mode, message) {
        if (mode === 'draft') {
          statusText.textContent = message || 'Draft';
          statusText.className = 'topbar-status status-draft';
        } else if (mode === 'saving') {
          statusText.textContent = message || 'Working...';
          statusText.className = 'topbar-status status-saving';
        } else if (mode === 'error') {
          statusText.textContent = message || 'Error';
          statusText.className = 'topbar-status status-error';
        } else {
          statusText.textContent = message || 'Ready';
          statusText.className = 'topbar-status status-ready';
        }
      }

      function updateVaultPathDisplay() {
        if (!currentVaultPath) {
          vaultPathText.textContent = 'Vault: not selected';
        } else {
          vaultPathText.textContent = `Vault: ${currentVaultPath}`;
        }
      }

      function updateLayoutVisibility() {
        navigationPanel.classList.toggle('collapsed', isNavigationHidden);
        notesPanel.classList.toggle('collapsed', isNotesHidden);

        const navigationWidth = isNavigationHidden ? '32px' : '168px';
        const notesWidth = isNotesHidden ? '32px' : '220px';
        mainLayout.style.gridTemplateColumns = `${navigationWidth} ${notesWidth} 1fr`;

        toggleNavigationButton.textContent = isNavigationHidden ? '>' : '<';
        toggleNavigationButton.setAttribute(
          'aria-label',
          isNavigationHidden ? 'Show Navigation' : 'Hide Navigation'
        );
        toggleNotesButton.textContent = isNotesHidden ? '>' : '<';
        toggleNotesButton.setAttribute(
          'aria-label',
          isNotesHidden ? 'Show Notes' : 'Hide Notes'
        );
      }

      function setIngestBanner(relativePath) {
        lastIngestedRelativePath = relativePath || '';
        lastIngestedAt = new Date().toLocaleString();

        if (!lastIngestedRelativePath) {
          ingestBanner.style.display = 'none';
          ingestBanner.innerHTML = '';
          return;
        }

        ingestBanner.style.display = 'block';
        ingestBanner.innerHTML = `
          <strong>Latest MCP import detected.</strong><br />
          Path: ${escapeHtml(lastIngestedRelativePath)}<br />
          Detected at: ${escapeHtml(lastIngestedAt)}
        `;
      }

      function renderEditor(note) {
        titleInput.value  = note.title;
        tagsInput.value   = normalizeTags(note.frontmatter?.tags).join(', ');
        sourceInput.value = note.frontmatter?.source || '';

        // Only reset the live editor when switching to a different note —
        // not on every renderApp() call (which would destroy the user's cursor position).
        if (note.id !== liveEditorLastNoteId) {
          liveEditorLastNoteId = note.id;
          isEditMode = false;
          editToggleButton.textContent = 'Edit';
          liveEditorInstance.setText(note.body);
        }
      }

      function getBaseFilteredNotes() {
        if (currentFilter === 'ai') {
          return notes.filter((note) => note.aiImported === true);
        }

        if (currentFilter === 'drafts') {
          return notes.filter((note) => note.source === 'draft');
        }

        if (currentFilter === 'vault') {
          return notes.filter((note) => note.source === 'vault');
        }

        return notes;
      }

      function getVisibleResults() {
        const baseNotes = getBaseFilteredNotes();

        if (!currentSearchQuery.trim()) {
          return baseNotes.map((note) => ({
            note,
            score: 0,
            snippet: '',
            matchField: ''
          }));
        }

        return baseNotes
          .map((note) => computeSearchResult(note, currentSearchQuery))
          .filter(Boolean)
          .sort((a, b) => b.score - a.score || a.note.title.localeCompare(b.note.title));
      }

      function ensureSelectionMatchesVisibleResults() {
        const selectedNote = getSelectedNote();
        const visibleResults = getVisibleResults();

        if (!selectedNote || !visibleResults.some((result) => result.note.id === selectedNote.id)) {
          selectedNoteId = visibleResults.length > 0 ? visibleResults[0].note.id : '';
        }
      }

      function updateFilterCounts() {
        filterAllMeta.textContent    = `${notes.length} note(s)`;
        filterAiMeta.textContent     = `${notes.filter((note) => note.aiImported === true).length} note(s)`;
        filterDraftsMeta.textContent = `${notes.filter((note) => note.source === 'draft').length} note(s)`;
        filterVaultMeta.textContent  = `${notes.filter((note) => note.source === 'vault').length} note(s)`;
      }

      function renderFilterNav() {
        const items = [
          [filterAll,    'all'],
          [filterAi,     'ai'],
          [filterDrafts, 'drafts'],
          [filterVault,  'vault']
        ];

        items.forEach(([element, filterKey]) => {
          element.className = filterKey === currentFilter ? 'nav-item active' : 'nav-item';
        });

        updateFilterCounts();
      }

      function getNoteSecondaryText(note) {
        const tags = normalizeTags(note.frontmatter?.tags);
        const sourceValue = note.frontmatter?.source ? String(note.frontmatter.source).trim() : '';
        const metadataBits = [];

        if (note.aiImported) {
          metadataBits.push('AI import');
        }

        if (note.source === 'vault' && note.relativePath) {
          metadataBits.push(`path: ${note.relativePath}`);
        } else if (note.source === 'draft') {
          metadataBits.push('unsaved draft');
        }

        if (tags.length > 0) {
          metadataBits.push(`tags: ${tags.join(', ')}`);
        }

        if (sourceValue) {
          metadataBits.push(`source: ${sourceValue}`);
        }

        if (metadataBits.length > 0) {
          return metadataBits.join(' • ');
        }

        if (note.body.trim().length === 0) {
          return 'Empty note';
        }

        return note.body.trim().split('\n')[0].slice(0, 40);
      }

      function renderSearchMeta(visibleResults) {
        const query = currentSearchQuery.trim();

        if (!query) {
          searchMeta.textContent = `Showing ${visibleResults.length} note(s) in the current filter.`;
          return;
        }

        searchMeta.textContent = `Found ${visibleResults.length} result(s) for "${query}" in the current filter.`;
      }

      function renderNoteList() {
        noteList.innerHTML = '';

        const visibleResults = getVisibleResults();
        renderSearchMeta(visibleResults);

        visibleResults.forEach((result) => {
          const note = result.note;
          const item = document.createElement('div');
          item.className = note.id === selectedNoteId ? 'note-item active' : 'note-item';

          const displayTitle = note.title.trim().length === 0 ? 'Untitled note' : note.title;
          const secondaryText = getNoteSecondaryText(note);
          const snippetHtml = result.snippet
            ? `<div class="note-snippet">${highlightText(result.snippet, currentSearchQuery)}</div>`
            : '';

          item.innerHTML = `
            <div class="note-title">${highlightText(displayTitle, currentSearchQuery)}</div>
            <div class="note-meta">${highlightText(secondaryText, currentSearchQuery)}</div>
            ${snippetHtml}
          `;

          item.addEventListener('click', () => {
            selectedNoteId = note.id;
            renderApp();
            setStatus('ready', 'Ready');
          });

          noteList.appendChild(item);
        });

        if (visibleResults.length === 0) {
          noteList.innerHTML = `<div class="note-meta">No search results in this filter.</div>`;
        }
      }

      function renderApp() {
        ensureSelectionMatchesVisibleResults();
        const selectedNote = getSelectedNote();

        updateVaultPathDisplay();
        renderFilterNav();
        renderNoteList();

        if (!selectedNote) {
          titleInput.value  = '';
          tagsInput.value   = '';
          sourceInput.value = '';
          liveEditorInstance.setText('');
          liveEditorLastNoteId = '';
          return;
        }

        renderEditor(selectedNote);
      }

      function updateSelectedNoteFromInputs() {
        const selectedNote = getSelectedNote();
        if (!selectedNote) return;

        selectedNote.title = titleInput.value;
        selectedNote.body  = liveEditorInstance.getText();
        selectedNote.frontmatter = {
          tags:   normalizeTags(tagsInput.value),
          source: sourceInput.value.trim()
        };

        if (selectedNote.source === 'vault') {
          selectedNote.meta = selectedNote.aiImported ? 'AI import note' : 'File note';
        } else {
          selectedNote.meta = 'Unsaved draft';
        }

        renderApp();
      }

      function handleEdit() {
        updateSelectedNoteFromInputs();
        setStatus('draft', 'Draft');
      }

      function getSelectedTemplate() {
        const selectedKey = templateSelect.value;
        return templates[selectedKey] || templates.blank;
      }

      function createNewNote() {
        const template = getSelectedTemplate();

        const newNote = {
          id: `draft:${nextDraftId}`,
          title: template.title,
          body: template.body,
          meta: 'Unsaved draft',
          fileName: '',
          relativePath: '',
          source: 'draft',
          aiImported: false,
          frontmatter: {
            tags:   normalizeTags(template.frontmatter?.tags),
            source: template.frontmatter?.source || ''
          }
        };

        nextDraftId += 1;
        notes.unshift(newNote);
        currentFilter = 'drafts';
        currentSearchQuery = '';
        searchInput.value = '';
        selectedNoteId = newNote.id;
        renderApp();
        setStatus('draft', `Draft created from template: ${templateSelect.value}`);
        titleInput.focus();
        titleInput.select();
      }

      async function startVaultWatcher() {
        if (!currentVaultPath) {
          return;
        }

        if (stopVaultWatcher) {
          stopVaultWatcher();
          stopVaultWatcher = null;
        }

        const result = await window.vaultApi.watchVaultFolder({
          vaultPath: currentVaultPath
        });

        if (!result.ok) {
          setStatus('error', `Watch failed: ${result.error}`);
          return;
        }

        stopVaultWatcher = window.vaultApi.onVaultChanged(async (payload) => {
          if (!currentVaultPath) {
            return;
          }

          const changedPath = String(payload?.fileName || '').replace(/\\/g, '/');
          const looksLikeAiImport = changedPath.toLowerCase().startsWith('inbox/ai chats/');

          const selectedNote = getSelectedNote();
          const preferredRelativePath =
            looksLikeAiImport
              ? changedPath
              : selectedNote && selectedNote.source === 'vault'
              ? selectedNote.relativePath
              : '';

          const refreshed = await refreshVaultNotes(preferredRelativePath, false);

          if (!refreshed) {
            return;
          }

          if (looksLikeAiImport) {
            const matchedNote = notes.find((note) => note.relativePath === changedPath);

            if (matchedNote) {
              currentFilter = 'ai';
              currentSearchQuery = '';
              searchInput.value = '';
              selectedNoteId = matchedNote.id;
              setIngestBanner(changedPath);
              renderApp();
              setStatus('ready', `New AI import detected: ${matchedNote.fileName}`);
              return;
            }
          }

          renderApp();
          setStatus('ready', 'Vault auto-refreshed');
        });
      }

      async function stopWatchingVault() {
        if (stopVaultWatcher) {
          stopVaultWatcher();
          stopVaultWatcher = null;
        }

        await window.vaultApi.unwatchVaultFolder();
      }

      async function chooseVaultFolder() {
        setStatus('saving', 'Choosing vault...');

        const result = await window.vaultApi.chooseVaultFolder();

        if (!result.ok) {
          if (result.canceled) {
            setStatus('ready', 'Vault selection canceled');
          } else {
            setStatus('error', `Choose vault failed: ${result.error}`);
          }
          return;
        }

        await stopWatchingVault();

        currentVaultPath = result.vaultPath;
        updateVaultPathDisplay();
        await startVaultWatcher();
        setStatus('ready', 'Vault selected');
      }

      async function seedDemoVault() {
        if (!currentVaultPath) {
          setStatus('error', 'Choose a vault first');
          return;
        }

        setStatus('saving', 'Creating demo vault...');

        const result = await window.vaultApi.seedDemoVault({
          vaultPath: currentVaultPath
        });

        if (!result.ok) {
          setStatus('error', `Demo vault failed: ${result.error}`);
          return;
        }

        currentFilter = 'all';
        currentSearchQuery = '';
        searchInput.value = '';

        const refreshed = await refreshVaultNotes('', false);

        if (refreshed) {
          setStatus('ready', `Demo vault created: ${result.createdCount} sample notes`);
        }
      }

      async function refreshVaultNotes(preferredRelativePath = '', updateStatus = true) {
        const result = await window.vaultApi.loadVaultNotes({
          vaultPath: currentVaultPath
        });

        if (!result.ok) {
          setStatus('error', `Load failed: ${result.error}`);
          return false;
        }

        if (result.notes.length === 0) {
          notes = [
            {
              id: 'draft:1',
              title: 'Untitled note',
              body: '',
              meta: 'Vault is empty',
              fileName: '',
              relativePath: '',
              source: 'draft',
              aiImported: false,
              frontmatter: {
                tags: [],
                source: ''
              }
            }
          ];
          currentFilter = 'all';
          selectedNoteId = 'draft:1';
          nextDraftId = 2;
          renderApp();

          if (updateStatus) {
            setStatus('ready', 'Vault loaded: 0 notes');
          }

          return true;
        }

        notes = result.notes;

        if (preferredRelativePath) {
          const matchingNote = notes.find((note) => note.relativePath === preferredRelativePath);
          selectedNoteId = matchingNote ? matchingNote.id : notes[0].id;
        } else {
          selectedNoteId = notes[0].id;
        }

        nextDraftId = 1;
        while (notes.some((note) => note.id === `draft:${nextDraftId}`)) {
          nextDraftId += 1;
        }

        renderApp();

        if (updateStatus) {
          setStatus('ready', `Vault loaded: ${notes.length} note(s)`);
        }

        return true;
      }

      async function saveCurrentNote() {
        if (!currentVaultPath) {
          setStatus('error', 'Choose a vault first');
          return;
        }

        const selectedNote = getSelectedNote();
        if (!selectedNote) {
          setStatus('error', 'No note selected');
          return;
        }

        setStatus('saving', 'Saving...');

        const result = await window.vaultApi.saveNote({
          vaultPath: currentVaultPath,
          note: {
            title: selectedNote.title,
            body:  liveEditorInstance.getText(),
            source: selectedNote.source,
            fileName: selectedNote.fileName,
            relativePath: selectedNote.relativePath,
            frontmatter: {
              tags:   normalizeTags(selectedNote.frontmatter?.tags),
              source: selectedNote.frontmatter?.source || ''
            }
          }
        });

        if (!result.ok) {
          setStatus('error', `Save failed: ${result.error}`);
          return;
        }

        const refreshed = await refreshVaultNotes(result.relativePath, false);

        if (refreshed) {
          setStatus('ready', `Saved: ${result.fileName}`);
        }
      }

      async function loadVaultNotes() {
        if (!currentVaultPath) {
          setStatus('error', 'Choose a vault first');
          return;
        }

        setStatus('saving', 'Loading vault...');
        await refreshVaultNotes();
      }

      function deleteDraftNote() {
        const selectedNote = getSelectedNote();
        if (!selectedNote) {
          setStatus('error', 'No note selected');
          return;
        }

        const confirmed = window.confirm(
          `Delete draft note "${selectedNote.title || 'Untitled note'}"?`
        );

        if (!confirmed) {
          setStatus('ready', 'Delete canceled');
          return;
        }

        notes = notes.filter((note) => note.id !== selectedNote.id);

        if (notes.length === 0) {
          const fallbackNote = {
            id: `draft:${nextDraftId}`,
            title: 'Untitled note',
            body: '',
            meta: 'Unsaved draft',
            fileName: '',
            relativePath: '',
            source: 'draft',
            aiImported: false,
            frontmatter: {
              tags: [],
              source: ''
            }
          };
          nextDraftId += 1;
          notes = [fallbackNote];
          selectedNoteId = fallbackNote.id;
          currentFilter = 'drafts';
        } else {
          selectedNoteId = notes[0].id;
        }

        renderApp();
        setStatus('ready', 'Draft deleted');
      }

      async function deleteFileBackedNote() {
        if (!currentVaultPath) {
          setStatus('error', 'Choose a vault first');
          return;
        }

        const selectedNote = getSelectedNote();
        if (!selectedNote) {
          setStatus('error', 'No note selected');
          return;
        }

        const confirmed = window.confirm(
          `Delete file-backed note "${selectedNote.title || 'Untitled note'}"?\n\nThis will remove ${selectedNote.relativePath || selectedNote.fileName} from the selected vault.`
        );

        if (!confirmed) {
          setStatus('ready', 'Delete canceled');
          return;
        }

        setStatus('saving', 'Deleting...');

        const result = await window.vaultApi.deleteNoteFile({
          vaultPath: currentVaultPath,
          relativePath: selectedNote.relativePath
        });

        if (!result.ok) {
          setStatus('error', `Delete failed: ${result.error}`);
          return;
        }

        const refreshed = await refreshVaultNotes('', false);

        if (refreshed) {
          setStatus('ready', `Deleted: ${result.fileName}`);
        }
      }

      async function deleteCurrentNote() {
        const selectedNote = getSelectedNote();

        if (!selectedNote) {
          setStatus('error', 'No note selected');
          return;
        }

        if (selectedNote.source === 'vault') {
          await deleteFileBackedNote();
        } else {
          deleteDraftNote();
        }
      }

      function setFilter(filterKey) {
        currentFilter = filterKey;
        renderApp();
        setStatus('ready', `Filter: ${filterKey}`);
      }

      function handleSearchInput() {
        currentSearchQuery = searchInput.value.trim();
        renderApp();

        if (currentSearchQuery) {
          setStatus('ready', `Search: ${currentSearchQuery}`);
        } else {
          setStatus('ready', 'Search cleared');
        }
      }

      window.addEventListener('beforeunload', () => {
        stopWatchingVault();
      });

      // ── Boot the live editor ───────────────────────────────────────────────
      liveEditorInstance = new LiveEditorComponent.LiveEditor(liveEditorContainer, {
        initialText: '',
        onChange: (text) => {
          const selectedNote = getSelectedNote();
          if (!selectedNote) return;
          selectedNote.body = text;
          renderNoteList();        // keep the note list preview in sync
          setStatus('draft', 'Draft');
        }
      });

      titleInput.addEventListener('input', handleEdit);
      tagsInput.addEventListener('input', handleEdit);
      sourceInput.addEventListener('input', handleEdit);
      searchInput.addEventListener('input', handleSearchInput);

      chooseVaultButton.addEventListener('click', chooseVaultFolder);
      seedDemoVaultButton.addEventListener('click', seedDemoVault);
      newNoteButton.addEventListener('click', createNewNote);
      saveNoteButton.addEventListener('click', saveCurrentNote);
      deleteNoteButton.addEventListener('click', deleteCurrentNote);
      loadVaultButton.addEventListener('click', loadVaultNotes);
      toggleNavigationButton.addEventListener('click', () => {
        isNavigationHidden = !isNavigationHidden;
        updateLayoutVisibility();
      });
      toggleNotesButton.addEventListener('click', () => {
        isNotesHidden = !isNotesHidden;
        updateLayoutVisibility();
      });

      filterAll.addEventListener('click',    () => setFilter('all'));
      filterAi.addEventListener('click',     () => setFilter('ai'));
      filterDrafts.addEventListener('click', () => setFilter('drafts'));
      filterVault.addEventListener('click',  () => setFilter('vault'));

      editToggleButton.addEventListener('click', () => {
        if (!isEditMode) {
          isEditMode = true;
          editToggleButton.textContent = 'Done';
          liveEditorInstance.enterEditMode();
        } else {
          isEditMode = false;
          editToggleButton.textContent = 'Edit';
          liveEditorInstance.exitEditMode();
          const selectedNote = getSelectedNote();
          if (selectedNote) selectedNote.body = liveEditorInstance.getText();
          setStatus('draft', 'Draft');
        }
      });

      // ── Overflow menu (···) ───────────────────────────────────────────
      const moreButton = document.getElementById('moreButton');
      const moreMenu   = document.getElementById('moreMenu');

      function closeMenu() {
        moreMenu.classList.remove('open');
        moreButton.setAttribute('aria-expanded', 'false');
      }

      moreButton.addEventListener('click', (e) => {
        e.stopPropagation();
        const opening = !moreMenu.classList.contains('open');
        moreMenu.classList.toggle('open');
        moreButton.setAttribute('aria-expanded', String(opening));
      });

      document.addEventListener('click', closeMenu);

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeMenu();
      });

      moreMenu.addEventListener('click', closeMenu);

      renderApp();
      updateLayoutVisibility();
      updateVaultPathDisplay();
      setStatus('ready', 'Ready');
    </script>
  </body>
</html>
