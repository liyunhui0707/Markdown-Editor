<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Vault App</title>
    <link rel="stylesheet" href="./node_modules/@toast-ui/editor/dist/toastui-editor.css" />
    <style>
      /* ── Design tokens (Stage 5.1: Claude warm paper + iA quietness) ── */
      :root {
        /* Surfaces */
        --bg:              #f5f3ee;   /* app background — warm paper */
        --surface:         #fbfaf6;   /* editor paper (off pure white) */
        --surface-sidebar: #efede6;   /* nav + notes panel background */
        --surface-chrome:  #f0eee8;   /* topbar / status bar / toolbars */
        --surface-muted:   #f0efe9;   /* hover / pressed states */

        /* Borders */
        --border:          #e2dfd6;   /* panel / input edges */
        --border-subtle:   #e9e6dd;   /* inner dividers, hairlines */

        /* Text */
        --text:            #26241f;   /* primary ink */
        --text-muted:      #8a8678;   /* secondary labels */
        --text-faint:      #b3ad9d;   /* meta — dates, counts, kbd */

        /* Accent (brand purple, slightly desaturated) */
        --accent:          #6d4ae0;
        --accent-bg:       rgba(109, 74, 224, 0.08);
        --accent-border:   rgba(109, 74, 224, 0.28);

        /* Status (semantic) */
        --success:         #3f7a4f;
        --warning:         #a86a2e;
        --danger:          #a8423a;
        --danger-bg:       rgba(168, 66, 58, 0.08);

        /* Typography */
        --font-ui:     "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
        --font-prose:  "iA Writer Quattro V", "Iowan Old Style", Charter, Georgia, ui-serif, serif;
        --font-mono:   "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
        --font-editor: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;

        /* Radius */
        --radius-sm: 6px;
        --radius-md: 8px;

        /* Elevation */
        --shadow-pop: 0 4px 16px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: var(--font-ui);
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        overflow: hidden;
      }

      .app-shell {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* ── Topbar — quiet, compact ─────────────────────────────────────── */

      .topbar {
        min-height: 48px;
        background: var(--surface-muted);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 16px;
        gap: 10px;
      }

      .topbar-left {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .topbar-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .topbar-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-muted);
        letter-spacing: 0.02em;
      }

      .topbar-status {
        font-size: 12px;
        color: var(--text-muted);
      }

      .status-draft   { color: var(--warning); font-weight: 600; }
      .status-ready   { color: var(--success); font-weight: 600; }
      .status-saving  { color: var(--accent);  font-weight: 600; }
      .status-error   { color: var(--danger);  font-weight: 600; }

      /* Buttons and controls */
      .action-button,
      .search-input {
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        border-radius: var(--radius-sm);
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 500;
      }

      .action-button {
        cursor: pointer;
        color: var(--text-muted);
      }

      .action-button:hover {
        background: var(--surface-muted);
        color: var(--text);
        border-color: var(--border);
      }

      .search-input {
        width: 100%;
        font-weight: 400;
        outline: none;
        background: var(--surface);
        font-size: 13px;
        padding: 7px 11px;
      }

      .search-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px var(--accent-bg);
      }

      .vault-path {
        font-size: 11px;
        color: var(--text-muted);
        max-width: 400px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* ── Main layout ─────────────────────────────────────────────────── */

      .main-layout {
        flex: 1;
        display: grid;
        grid-template-columns: 300px 1fr;
        min-height: 0;
      }

      /* ── Side panels (Navigation + Notes) ───────────────────────────── */

      .panel {
        border-right: 1px solid var(--border);
        background: var(--surface-sidebar);
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .panel:last-child {
        border-right: none;
      }

      /* Sidebar hidden: grid column collapses to 0px; overflow:hidden clips content.
         Must NOT use display:none — that removes the element from grid flow and
         causes the workspace to land in the 0px column, blanking the page. */
      #sidebarPanel {
        overflow: hidden;
      }

      .panel-header {
        padding: 8px 10px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border-subtle);
        background: transparent;
      }

      .panel-header-title {
        min-width: 0;
      }

      .panel-body {
        padding: 10px;
        overflow: auto;
        flex: 1;
      }

      .panel-tools {
        padding: 10px;
        border-bottom: 1px solid var(--border-subtle);
        background: transparent;
      }

      .search-meta {
        margin-top: 7px;
        font-size: 11px;
        color: var(--text-muted);
      }

      .ingest-banner {
        margin-top: 10px;
        font-size: 11px;
        color: var(--text);
        line-height: 1.5;
        background: var(--accent-bg);
        border: 1px solid var(--accent-border);
        border-radius: 6px;
        padding: 8px 10px;
      }

      /* ── Navigation items ────────────────────────────────────────────── */

      .nav-item {
        padding: 7px 10px;
        margin-bottom: 2px;
        border-radius: 6px;
        background: transparent;
        cursor: pointer;
        border-left: 2px solid transparent;
      }

      .nav-item:hover {
        background: var(--border-subtle);
      }

      .nav-item.active {
        background: var(--accent-bg);
        border-left-color: var(--accent);
      }

      .nav-label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
      }

      .nav-item.active .nav-label {
        color: var(--accent);
        font-weight: 600;
      }

      .nav-meta {
        margin-top: 2px;
        font-size: 11px;
        color: var(--text-muted);
      }

      /* ── Note list items ─────────────────────────────────────────────── */

      .note-item {
        padding: 10px 12px;
        margin-bottom: 3px;
        border-radius: 6px;
        background: transparent;
        cursor: pointer;
        border-left: 2px solid transparent;
      }

      .note-item:hover {
        background: var(--border-subtle);
      }

      .note-item.active {
        background: var(--accent-bg);
        border-left-color: var(--accent);
      }

      /* Top row: title (flex-grows, ellipsises) + optional badge. */
      .note-row-head {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 3px;
      }

      .note-title {
        flex: 1 1 auto;
        min-width: 0;
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .note-item.active .note-title {
        color: var(--accent);
      }

      .note-meta {
        font-size: 11px;
        color: var(--text-muted);
        line-height: 1.4;
      }

      .note-snippet {
        margin-top: 5px;
        font-size: 11px;
        color: var(--text-muted);
        line-height: 1.4;
      }

      /* Type badge (right of title). Vault notes get no badge. */
      .note-badge {
        flex: 0 0 auto;
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.04em;
        padding: 1px 6px;
        border-radius: 3px;
        line-height: 1.4;
      }

      .note-badge-ai {
        background: var(--accent-bg);
        color: var(--accent);
      }

      .note-badge-draft {
        background: var(--surface-muted);
        color: var(--text-muted);
        border: 1px solid var(--border-subtle);
      }

      /* Tag chips below the meta line. Wraps if many; capped to 3 + overflow. */
      .note-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 6px;
      }

      .note-tag,
      .note-tag-overflow {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--text-muted);
        background: var(--surface-muted);
        padding: 1px 6px;
        border-radius: 3px;
      }

      .note-tag-overflow {
        color: var(--text-faint);
      }

      mark {
        background: var(--accent-bg);
        color: var(--accent);
        padding: 0 2px;
        border-radius: 2px;
      }

      /* ── Workspace: single unified panel ─────────────────────────────── */

      .workspace {
        display: flex;
        flex-direction: column;
        min-height: 0;
        flex: 1;
      }

      .workspace-panel {
        background: var(--surface);
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
      }

      .workspace-body {
        padding: 32px clamp(40px, 8%, 96px);
        flex: 1;
        min-height: 0;
        overflow: auto;
        background: var(--surface);
        display: flex;
        flex-direction: column;
      }

      .editor-stack {
        display: flex;
        flex-direction: column;
        gap: 0;
        width: 100%;
        max-width: 720px;
        margin: 0 auto;
        flex: 1;
        min-height: 0;
      }

      /* Title — document heading, no box. Textarea so long titles wrap. */
      .title-input {
        width: 100%;
        display: block;
        resize: none;
        overflow: hidden;
        line-height: 1.25;
        border: none;
        border-bottom: 1px solid var(--border);
        border-radius: 0;
        padding: 0 0 14px 0;
        margin-bottom: 20px;
        font-size: 28px;
        font-weight: 700;
        color: var(--text);
        background: transparent;
        outline: none;
        letter-spacing: -0.01em;
        font-family: var(--font-ui);
      }

      .title-input:focus {
        border-bottom-color: var(--accent);
      }

      /* Meta row — quiet, below the title */

      /* ── Live editor: document surface, no box ───────────────────────── */

      .live-editor-container {
        flex: 1;
        border: none;
        border-radius: 0;
        background: transparent;
        padding: 0;
        min-height: 0;
        cursor: text;
      }

      /* Stage 6.2: no-selection state. Disable mouse interaction with the
         editor so typed text can't accumulate on a non-existent note, and
         visually mute the surface so the disabled state is obvious. */
      .live-editor-container.is-no-selection {
        pointer-events: none;
        opacity: 0.45;
        user-select: none;
        cursor: default;
      }

      .title-input:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      /* Hint shown in an empty note */
      .live-editor-empty-hint {
        padding: 4px 0;
        color: var(--text-faint);
        font-style: italic;
        font-size: 16px;
      }

      /* Each rendered Markdown block — document rhythm, no hover box */
      .live-editor-block {
        padding: 2px 0;
        border-radius: 0;
        cursor: text;
      }

      .live-editor-block:hover {
        background: transparent;
      }

      /* Write / Preview toggle — small tab bar above the editor. */
      .editor-mode-toggle {
        display: flex;
        gap: 4px;
        margin-bottom: 8px;
      }

      .mode-button {
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-muted);
        border-radius: 6px;
        padding: 4px 12px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
      }

      .mode-button:hover {
        background: var(--surface-muted);
        color: var(--text);
      }

      .mode-button-active,
      .mode-button-active:hover {
        background: var(--accent-bg);
        border-color: var(--accent);
        color: var(--accent);
      }

      /* HybridWriteView pane — the Write surface the user actually edits. */
      .live-editor-container {
        display: flex;
        flex-direction: column;
      }

      .hybrid-write-pane {
        flex: 1;
        min-height: 0;
        overflow: auto;
      }

      .hybrid-write-pane.is-hidden {
        display: none;
      }

      /* Active block textarea — strip native textarea chrome so selecting
         text shows only the normal browser selection highlight (no border
         box, focus ring, drop shadow, or resize grip). Inherit the editor
         font / color / line-height so the active block visually matches the
         surrounding rendered blocks. */
      .hybrid-active-textarea {
        width: 100%;
        box-sizing: border-box;
        border: 0;
        outline: none;
        box-shadow: none;
        background: transparent;
        resize: none;
        font: inherit;
        color: inherit;
        line-height: inherit;
        padding: 0;
        margin: 0;
        overflow-y: hidden;
      }

      /* Internal wrapper inside HybridWriteView. Stretching it to full
         height + flex column lets the tail affordance absorb whatever
         vertical space is left below the rendered blocks, so clicking
         anywhere in the empty Write area below a short document still
         lands on the click target. */
      .hybrid-write-inner {
        min-height: 100%;
        display: flex;
        flex-direction: column;
      }

      /* Click target below the last block: lets the user start a new
         paragraph without having to edit existing text first. flex: 1
         absorbs the remaining vertical space inside .hybrid-write-inner;
         min-height keeps a usable click area on tall documents. */
      .hybrid-tail-affordance {
        flex: 1;
        min-height: 2em;
        cursor: text;
      }

      /* CM6 hybrid live-styling (?writeEngine=hybrid-cm6, Stage 11.4).
         Headings are styled via Decoration.mark — text is never replaced.
         The "#" markers (HeaderMark) are hidden outside the active line and
         revealed dimmed when the cursor is on the heading line. */
      .cm-md-heading-mark {
        display: none;
      }
      .cm-activeLine .cm-md-heading-mark {
        display: inline;
        color:   var(--text-muted);
        opacity: 0.5;
      }
      .cm-md-h1 { font-size: 1.75em; font-weight: 700; line-height: 1.2; }
      .cm-md-h2 { font-size: 1.40em; font-weight: 700; }
      .cm-md-h3 { font-size: 1.15em; font-weight: 600; }
      .cm-md-h4 { font-size: 1.00em; font-weight: 600; }
      .cm-md-h5 { font-size: 0.90em; font-weight: 600; }
      .cm-md-h6 { font-size: 0.85em; font-weight: 600; color: var(--text-muted); }

      /* CM6 hybrid live-styling — inline (Stage 11.5).
         Emphasis / inline-code content is styled in place; the delimiter
         markers carry .cm-md-syntax so one rule can hide them by default
         and another rule reveals them dimmed on the cursor's line. */
      .cm-md-bold        { font-weight: 700; }
      .cm-md-italic      { font-style:  italic; }
      .cm-md-inline-code {
        font-family:   var(--font-mono);
        background:    var(--surface-muted);
        padding:       0 0.2em;
        border-radius: 3px;
        font-size:     0.92em;
      }
      .cm-md-syntax { display: none; }
      .cm-activeLine .cm-md-syntax {
        display: inline;
        color:   var(--text-muted);
        opacity: 0.5;
      }

      /* Toast UI mount — hosts the Preview renderer. Hidden by default; shown
         when Preview mode is active via .is-visible. The Toast UI toolbar and
         mode-switch are inert here (HybridWriteView is the active write
         surface), so we hide them via CSS. The internal Markdown/Preview
         tab bar is also hidden — our own toggle controls mode. */
      .toast-preview-mount {
        display: none;
        flex: 1;
        min-height: 0;
      }

      .toast-preview-mount.is-visible {
        display: block;
      }

      /* Hide only inert Toast UI controls. Do NOT hide
         .toastui-editor-md-tab-style — that wrapper contains the preview
         pane itself; hiding it would make Preview unreachable. */
      .toast-preview-mount .toastui-editor-toolbar,
      .toast-preview-mount .toastui-editor-mode-switch,
      .toast-preview-mount .toastui-editor-md-tab-container {
        display: none !important;
      }

      /* Active textarea — fills the full editor area */
      .live-editor-active-textarea {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        border: none;
        border-left: 3px solid var(--accent);
        border-radius: 0;
        padding: 2px 0 2px 14px;
        font-size: 15px;
        line-height: 1.8;
        font-family: var(--font-editor);
        background: transparent;
        color: var(--text);
        box-shadow: none;
        resize: none;
        outline: none;
        display: block;
      }

      /* ── Markdown typography — readable, document-grade ─────────────── */

      .preview-markdown {
        font-family: var(--font-prose);
        font-size: 16px;
        line-height: 1.8;
        color: var(--text);
      }

      .preview-markdown h1 {
        font-size: 1.75em;
        font-weight: 700;
        color: var(--text);
        margin: 0 0 0.4em 0;
        padding-bottom: 0.3em;
        border-bottom: 1px solid var(--border-subtle);
        letter-spacing: -0.02em;
      }

      .preview-markdown h2 {
        font-size: 1.35em;
        font-weight: 600;
        color: var(--text);
        margin: 0 0 0.3em 0;
      }

      .preview-markdown h3 {
        font-size: 1.1em;
        font-weight: 600;
        color: var(--text);
        margin: 0 0 0.3em 0;
      }

      .preview-markdown p {
        margin: 0 0 1.1em 0;
      }

      .preview-markdown ul,
      .preview-markdown ol {
        padding-left: 1.6em;
        margin: 0 0 1.1em 0;
      }

      .preview-markdown li {
        margin-bottom: 0.35em;
      }

      .preview-markdown strong {
        font-weight: 600;
        color: var(--text);
      }

      .preview-markdown a {
        color: var(--accent);
        text-decoration: none;
      }

      .preview-markdown a:hover {
        text-decoration: underline;
      }

      /* Inline code */
      .preview-markdown code {
        background: var(--accent-bg);
        border: 1px solid var(--accent-border);
        padding: 1px 6px;
        border-radius: 4px;
        font-size: 0.88em;
        font-family: var(--font-mono);
        color: var(--accent);
      }

      /* Code block */
      .preview-markdown pre {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 16px 20px;
        border-radius: 8px;
        overflow-x: auto;
        margin: 0 0 1.1em 0;
      }

      .preview-markdown pre code {
        background: transparent;
        border: none;
        padding: 0;
        color: var(--text);
        font-size: 0.9em;
        font-family: var(--font-mono);
      }

      /* Blockquote */
      .preview-markdown blockquote {
        border-left: 3px solid var(--accent);
        background: var(--surface);
        padding: 6px 16px;
        margin: 0 0 1.1em 0;
        color: var(--text-muted);
        border-radius: 0 4px 4px 0;
      }

      .preview-markdown hr {
        border: none;
        border-top: 1px solid var(--border-subtle);
        margin: 2em 0;
      }

      .action-button--destructive {
        color: var(--danger) !important;
      }

      .action-button--destructive:hover {
        background: var(--danger-bg) !important;
      }

      /* ── Top chrome removal ──────────────────────────────────────────── */

      /* Panel headers become invisible rails — only the toggle icon shows */
      .panel-header {
        padding: 4px 6px;
        border-bottom: none;
        background: transparent;
        min-height: 0;
      }

      .panel-header-title {
        display: none;
      }

      /* Workspace panel-header hidden — Edit/Done moved to note-actions */
      .workspace-panel > .panel-header {
        display: none;
      }

      /* ── Note actions bar ────────────────────────────────────────────── */

      .note-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 5px 10px;
        border-bottom: 1px solid var(--border-subtle);
        background: var(--surface-chrome);
        gap: 6px;
        flex-shrink: 0;
      }

      .note-actions-left {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .note-actions-right {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      /* ── Sidebar toggle ──────────────────────────────────────────────── */

      .sidebar-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--surface);
        color: var(--text-muted);
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        flex-shrink: 0;
        margin-right: 4px;
        transition: color 0.15s, background 0.15s;
      }

      .sidebar-toggle:hover {
        background: var(--surface-muted);
        color: var(--text);
        border-color: var(--border);
      }

      /* Filter section separator inside sidebar */
      .sidebar-divider {
        height: 1px;
        background: var(--border-subtle);
        margin: 4px 0;
      }

      /* ── Status bar footer ───────────────────────────────────────────── */

      .status-bar {
        height: 24px;
        background: var(--surface-muted);
        border-top: 1px solid var(--border-subtle);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 12px;
        font-size: 11px;
        color: var(--text-muted);
        flex-shrink: 0;
      }

      .status-bar-path {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 40%;
      }

      /* Read-only document readouts in the centre of the status bar.
         min-width:0 + overflow:hidden lets the cluster shrink at narrow
         widths instead of pushing the right-hand status pill out of view. */
      .status-bar-counts {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text-faint);
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      .status-bar-counts .sep {
        color: var(--border);
      }

      /* ── Toast UI Editor integration ─────────────────────────────────── */

      /* Force the editor wrapper to fill the live-editor-container */

    </style>

    <script src="./lib/toastui-bundle.js"></script>

    <script src="./node_modules/marked/lib/marked.umd.js"></script>
    <script>
      // marked's UMD bundle exposes the package as window.marked; HybridWriteView's
      // browser branch reads window.Marked, so bridge the constructor here.
      window.Marked = window.marked && window.marked.Marked;

    <script src="./lib/dirty-state.js"></script>

    <script>
      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function escapeRegExp(text) {
        return String(text).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      }

      function normalizeTags(value) {
        if (!value) return [];

        if (Array.isArray(value)) {
          return value.map((item) => String(item).trim()).filter(Boolean);
        }

        return String(value)
          .split(',')
          .map((item) => item.trim())
          .filter(Boolean);
      }

      function normalizeSearchText(value) {
        return String(value || '').toLowerCase();
      }

      /* Build a metadata text block from structured frontmatter values. */
      function serializeMetaPrefix(frontmatter) {
        const tags   = normalizeTags(frontmatter?.tags).join(', ');
        const source = (frontmatter?.source || '').trim();
        const lines  = [];
        if (tags)   lines.push(`Tags: ${tags}`);
        if (source) lines.push(`Source: ${source}`);
        return lines.join('\n');
      }

      /* Parse the metadata block from the very top of the body text.
         Stops at the first line that is not Tags:/Source:.
         Returns { tags, source, cleanBody } — cleanBody has the meta lines removed. */
      function stripMetaPrefix(fullText) {
        const lines = (fullText || '').split('\n');
        let tags = [], source = '', i = 0;
        while (i < lines.length) {
          const tm = lines[i].match(/^Tags:\s*(.*)/i);
          const sm = lines[i].match(/^Source:\s*(.*)/i);
          if (tm)      { tags   = normalizeTags(tm[1]); i++; }
          else if (sm) { source = sm[1].trim();          i++; }
          else break;
        }
        while (i < lines.length && lines[i].trim() === '') i++;
        return { tags, source, cleanBody: lines.slice(i).join('\n') };
      }

      function highlightText(text, query) {
        if (!query) {
          return escapeHtml(text);
        }

        const safeText = String(text || '');
        const regex = new RegExp(`(${escapeRegExp(query)})`, 'ig');
        return escapeHtml(safeText).replace(regex, '<mark>$1</mark>');
      }

      function getSnippetFromText(text, query, radius = 55) {
        const raw = String(text || '').replace(/\s+/g, ' ').trim();

        if (!raw) {
          return '';
        }

        if (!query) {
          return raw.slice(0, 110);
        }

        const lowerRaw = raw.toLowerCase();
        const lowerQuery = query.toLowerCase();
        const matchIndex = lowerRaw.indexOf(lowerQuery);

        if (matchIndex === -1) {
          return raw.slice(0, 110);
        }

        const start = Math.max(0, matchIndex - radius);
        const end = Math.min(raw.length, matchIndex + lowerQuery.length + radius);
        let snippet = raw.slice(start, end);

        if (start > 0) {
          snippet = `…${snippet}`;
        }

        if (end < raw.length) {
          snippet = `${snippet}…`;
        }

        return snippet;
      }

      function buildSearchCorpus(note) {
        const tags = normalizeTags(note.frontmatter?.tags).join(', ');
        const sourceValue = note.frontmatter?.source || '';
        return [
          note.title || '',
          note.body || '',
          tags,
          sourceValue,
          note.relativePath || '',
          note.fileName || ''
        ].join('\n');
      }

      function computeSearchResult(note, query) {
        const normalizedQuery = normalizeSearchText(query);
        const corpus = buildSearchCorpus(note);
        const normalizedCorpus = normalizeSearchText(corpus);

        if (!normalizedQuery) {
          return {
            note,
            score: 0,
            snippet: '',
            matchField: ''
          };
        }

        if (!normalizedCorpus.includes(normalizedQuery)) {
          return null;
        }

        const title = normalizeSearchText(note.title);
        const body = normalizeSearchText(note.body);
        const tags = normalizeSearchText(normalizeTags(note.frontmatter?.tags).join(', '));
        const sourceValue = normalizeSearchText(note.frontmatter?.source || '');
        const relativePath = normalizeSearchText(note.relativePath || '');
        const fileName = normalizeSearchText(note.fileName || '');

        let score = 0;
        let snippet = '';
        let matchField = '';

        if (title.includes(normalizedQuery)) {
          score += 50;
          snippet = getSnippetFromText(note.title, query, 30);
          matchField = 'title';
        }

        if (tags.includes(normalizedQuery)) {
          score += 35;
          if (!snippet) {
            snippet = getSnippetFromText(normalizeTags(note.frontmatter?.tags).join(', '), query, 30);
            matchField = 'tags';
          }
        }

        if (sourceValue.includes(normalizedQuery)) {
          score += 30;
          if (!snippet) {
            snippet = getSnippetFromText(note.frontmatter?.source || '', query, 30);
            matchField = 'source';
          }
        }

        if (relativePath.includes(normalizedQuery) || fileName.includes(normalizedQuery)) {
          score += 25;
          if (!snippet) {
            snippet = getSnippetFromText(note.relativePath || note.fileName || '', query, 40);
            matchField = 'path';
          }
        }

        if (body.includes(normalizedQuery)) {
          score += 20;
          if (!snippet) {
            snippet = getSnippetFromText(note.body, query, 60);
            matchField = 'body';
          }
        }

        if (!snippet) {
          snippet = getSnippetFromText(note.body || note.title, query, 60);
        }

        return {
          note,
          score,
          snippet,
          matchField
        };
      }

      const titleInput             = document.getElementById('titleInput');
      const liveEditorContainer    = document.getElementById('liveEditorContainer');
      const searchInput            = document.getElementById('searchInput');
      const searchMeta             = document.getElementById('searchMeta');
      const ingestBanner           = document.getElementById('ingestBanner');
      const statusText             = document.getElementById('statusText');
      const vaultPathText          = document.getElementById('vaultPathText');
      const docWords               = document.getElementById('docWords');
      const docChars               = document.getElementById('docChars');
      const docLines               = document.getElementById('docLines');
      const docEngine              = document.getElementById('docEngine');
      const chooseVaultButton      = document.getElementById('chooseVaultButton');
      const newNoteButton          = document.getElementById('newNoteButton');
      const saveNoteButton         = document.getElementById('saveNoteButton');
      const deleteNoteButton       = document.getElementById('deleteNoteButton');
      const loadVaultButton        = document.getElementById('loadVaultButton');
      const sidebarToggle          = document.getElementById('sidebarToggle');
      const sidebarPanel           = document.getElementById('sidebarPanel');
      const noteList               = document.getElementById('noteList');
      const mainLayout             = document.getElementById('mainLayout');

      const filterAll       = document.getElementById('filterAll');
      const filterAi        = document.getElementById('filterAi');
      const filterDrafts    = document.getElementById('filterDrafts');
      const filterVault     = document.getElementById('filterVault');
      const filterAllMeta   = document.getElementById('filterAllMeta');
      const filterAiMeta    = document.getElementById('filterAiMeta');
      const filterDraftsMeta = document.getElementById('filterDraftsMeta');
      const filterVaultMeta = document.getElementById('filterVaultMeta');

      let stopVaultWatcher        = null;
      let currentVaultPath        = '';
      let currentFilter           = 'all';
      let currentSearchQuery      = '';
      let lastIngestedRelativePath = '';
      let lastIngestedAt          = '';
      let isSidebarHidden         = false;  // open by default
      let liveEditorInstance      = null;
      let liveEditorLastNoteId    = ''; // tracks which note is loaded so we don't reset on every render
      let hasLoadedVaultNotes     = false;
      // Stage 6.3B: while saveAllDirtyNotes is iterating, the watcher
      // refresh callback bails out so its loadVaultNotes calls don't
      // race in-flight saves. Save-all does its OWN single refresh
      // after the loop. Cleared in a try/finally to survive throws.
      let saveAllInProgress       = false;
      // Per-note editor state cache for note-local undo/redo. Keyed by note id;
      // each value is { state, doc } where state is the opaque engine state and
      // doc is the text it represented at cache time (the mismatch guard).
      // Populated only when the active engine exposes getState/setState — so
      // CM6 participates and Hybrid does not (Hybrid undo is per-textarea-only
      // and intentionally deferred; see comment near the engine wiring below).
      const noteEditorStates      = new Map();

      // Per-note view state for Bug #2 follow-up: each note remembers its own
      // mode (Write or Preview) and its own scroll ratio. Captured when
      // leaving a note (renderEditor's switch branch), restored when entering
      // a note. Default for never-visited notes is { mode: 'write',
      // scrollRatio: 0 }. Migrated alongside noteEditorStates on save id
      // changes (rename / draft → vault), cleaned up on delete.
      const noteViewStates        = new Map();
      let   currentMode           = 'write';

      // Stage 6.2: empty initial state. The previous editable Welcome
      // draft was a real (and editable) note that the choose-vault flow
      // would silently wipe; the new contract is "show nothing until the
      // user creates a note or chooses a vault". The renderer's
      // no-selection branch already paints a usable empty editor.
      let notes = [];
      let selectedNoteId = '';
      let nextDraftId = 1;

      function getSelectedNote() {
        return notes.find((note) => note.id === selectedNoteId);
      }

      function setStatus(mode, message) {
        if (mode === 'draft') {
          statusText.textContent = message || 'Draft';
          statusText.className = 'topbar-status status-draft';
        } else if (mode === 'saving') {
          statusText.textContent = message || 'Working...';
          statusText.className = 'topbar-status status-saving';
        } else if (mode === 'error') {
          statusText.textContent = message || 'Error';
          statusText.className = 'topbar-status status-error';
        } else {
          statusText.textContent = message || 'Ready';
          statusText.className = 'topbar-status status-ready';
        }
      }

      // Stage 6.1: derive the bottom-right status from the currently-selected
      // note's dirty state, so navigating between notes never silently loses
      // the Draft signal for an unsaved-but-modified vault note.
      //
      // Callers that want a contextual ready-state message (e.g. "Filter: ai",
      // "Search: foo", "Vault auto-refreshed") pass it as `messageIfClean`.
      // The helper still emits Draft when the selected note is dirty, so a
      // ready-message override never silently shadows an unsaved edit.
      function setStatusFromSelectedNote(messageIfClean) {
        const selected = getSelectedNote();
        const dirty = window.DirtyState
          ? window.DirtyState.isNoteDirty(selected)
          : false;
        if (dirty) {
          setStatus('draft', 'Draft');
        } else {
          setStatus('ready', messageIfClean || 'Ready');
        }
      }

      function updateVaultPathDisplay() {
        if (!currentVaultPath) {
          vaultPathText.textContent = 'Vault: not selected';
        } else {
          vaultPathText.textContent = `Vault: ${currentVaultPath}`;
        }
      }

      // Read-only status-bar readouts: words / chars / lines.
      // Engine label is set once at boot (constant for the session).
      // Pass `text` to skip a redundant getText() round-trip from the
      // change handler; omit it to read live from the active editor.
      function updateStatusReadouts(text) {
        const stats = window.DocStats;
        if (!stats) return;
        const t = text != null
          ? text
          : (liveEditorInstance ? liveEditorInstance.getText() : '');
        docWords.textContent = stats.formatNumber(stats.countWords(t)) + ' words';
        docChars.textContent = stats.formatNumber(stats.countChars(t)) + ' chars';
        docLines.textContent = stats.formatNumber(stats.countLines(t)) + ' lines';
      }

      function updateLayoutVisibility() {
        mainLayout.style.gridTemplateColumns = isSidebarHidden ? '0px 1fr' : '300px 1fr';

        const label = isSidebarHidden ? 'Show sidebar' : 'Hide sidebar';
        sidebarToggle.textContent = isSidebarHidden ? '›' : '‹';
        sidebarToggle.title = label;
        sidebarToggle.setAttribute('aria-label', label);
        sidebarToggle.setAttribute('aria-expanded', String(!isSidebarHidden));
      }

      function autoResizeTitleInput() {
        if (!titleInput.scrollHeight) return;
        titleInput.style.height = 'auto';
        titleInput.style.height = titleInput.scrollHeight + 'px';
      }

      // Titles are single-logical-line strings (serialized as a Markdown H1).
      // Replace any CR/LF sequences with a single space so pasting multiline
      // text or an IME commit that emits a newline never corrupts the file.
      function normalizeTitleInputValue(value) {
        return String(value).replace(/[\r\n]+/g, ' ');
      }

      function setIngestBanner(relativePath) {
        lastIngestedRelativePath = relativePath || '';
        lastIngestedAt = new Date().toLocaleString();

        if (!lastIngestedRelativePath) {
          ingestBanner.style.display = 'none';
          ingestBanner.innerHTML = '';
          return;
        }

        ingestBanner.style.display = 'block';
        ingestBanner.innerHTML = `
          <strong>Latest MCP import detected.</strong><br />
          Path: ${escapeHtml(lastIngestedRelativePath)}<br />
          Detected at: ${escapeHtml(lastIngestedAt)}
        `;
      }

      function renderEditor(note) {
        if (titleInput.value !== note.title) {
          titleInput.value = note.title;
        }
        autoResizeTitleInput();

        // Only reset the live editor when switching to a different note —
        // not on every renderApp() call (which would destroy the user's cursor position).
        if (note.id !== liveEditorLastNoteId) {
          // Save outgoing state for note-local undo/redo. Only when the engine
          // supports it (CM6) and the outgoing note is still in `notes` (so we
          // know its current body to pair with the state).
          if (liveEditorLastNoteId && typeof liveEditorInstance.getState === 'function') {
            const outgoing = notes.find((n) => n.id === liveEditorLastNoteId);
            if (outgoing) {
              const outgoingState = liveEditorInstance.getState();
              if (outgoingState) {
                noteEditorStates.set(liveEditorLastNoteId, {
                  state: outgoingState,
                  doc: outgoing.body,
                });
              }
            }
          }

          // Capture per-note view state (mode + scroll ratio) for the OUTGOING
          // note so a future return to this note can restore it. Reads the
          // currently-visible pane's scroll metrics, which is correct because
          // the click handler hasn't yet mutated the DOM (we're inside the
          // very renderEditor call triggered by the note switch).
          if (liveEditorLastNoteId) {
            captureNoteViewState(liveEditorLastNoteId);
          }

          liveEditorLastNoteId = note.id;

          // Migration: if the body doesn't already start with inline metadata,
          // prepend it from frontmatter and store it back so future saves are canonical.
          const { tags: existingTags } = stripMetaPrefix(note.body);
          const hasMeta = existingTags.length > 0
            || /^Source:/im.test((note.body || '').split('\n').slice(0, 3).join('\n'));
          let migrated = false;
          if (!hasMeta) {
            const prefix = serializeMetaPrefix(note.frontmatter);
            if (prefix) {
              note.body = prefix + '\n\n' + (note.body || '');
              migrated = true;
            }
          }

          // Restore from cache when possible: same note id AND cached doc still
          // matches the current body. If the body diverged (vault refresh, save
          // round-trip, anything that rewrote it), drop the stale entry and
          // fall back to the fresh-load path. Migration always forces a fresh
          // load because we just rewrote note.body.
          let restored = false;
          if (!migrated && typeof liveEditorInstance.setState === 'function') {
            const cached = noteEditorStates.get(note.id);
            if (cached && cached.doc === note.body) {
              liveEditorInstance.setState(cached.state);
              restored = true;
            } else if (cached) {
              noteEditorStates.delete(note.id);
            }
          }
          if (!restored) {
            liveEditorInstance.setText(note.body);
          }

          // Restore the INCOMING note's saved mode + scroll ratio. Defaults
          // to { mode: 'write', scrollRatio: 0 } for never-visited notes,
          // matching the user's product rule.
          restoreNoteViewState(note.id);
        }
      }

      function getBaseFilteredNotes() {
        if (currentFilter === 'ai') {
          return notes.filter((note) => note.aiImported === true);
        }

        if (currentFilter === 'drafts') {
          // Stage 6.1: dirty saved-vault notes also belong in Drafts so
          // unsaved work is discoverable from the filter pill.
          return notes.filter((note) =>
            note.source === 'draft'
            || (window.DirtyState && window.DirtyState.isNoteDirty(note))
          );
        }

        if (currentFilter === 'vault') {
          return notes.filter((note) => note.source === 'vault');
        }

        return notes;
      }

      function getVisibleResults() {
        const baseNotes = getBaseFilteredNotes();

        if (!currentSearchQuery.trim()) {
          return baseNotes.map((note) => ({
            note,
            score: 0,
            snippet: '',
            matchField: ''
          }));
        }

        return baseNotes
          .map((note) => computeSearchResult(note, currentSearchQuery))
          .filter(Boolean)
          .sort((a, b) => b.score - a.score || a.note.title.localeCompare(b.note.title));
      }

      function ensureSelectionMatchesVisibleResults() {
        const selectedNote = getSelectedNote();
        const visibleResults = getVisibleResults();

        if (!selectedNote || !visibleResults.some((result) => result.note.id === selectedNote.id)) {
          selectedNoteId = visibleResults.length > 0 ? visibleResults[0].note.id : '';
        }
      }

      function scrollSelectedNoteIntoView() {
        let activeItem = null;
        for (let i = 0; i < noteList.children.length; i++) {
          if (String(noteList.children[i].className || '').includes('active')) {
            activeItem = noteList.children[i];
            break;
          }
        }
        if (!activeItem) return;
        if (noteList.scrollHeight <= noteList.clientHeight) return;
        // offsetTop is relative to the nearest positioned ancestor (the body in this
        // layout — #noteList has no position set). Use getBoundingClientRect instead
        // so the delta is always relative to the visible noteList top edge.
        const containerTop = noteList.getBoundingClientRect().top;
        const itemTop = activeItem.getBoundingClientRect().top;
        noteList.scrollTop += itemTop - containerTop;
      }

      function updateFilterCounts() {
        filterAllMeta.textContent    = `${notes.length} note(s)`;
        filterAiMeta.textContent     = `${notes.filter((note) => note.aiImported === true).length} note(s)`;
        filterDraftsMeta.textContent = `${notes.filter((note) =>
          note.source === 'draft'
          || (window.DirtyState && window.DirtyState.isNoteDirty(note))
        ).length} note(s)`;
        filterVaultMeta.textContent  = `${notes.filter((note) => note.source === 'vault').length} note(s)`;
      }

      function renderFilterNav() {
        const items = [
          [filterAll,    'all'],
          [filterAi,     'ai'],
          [filterDrafts, 'drafts'],
          [filterVault,  'vault']
        ];

        items.forEach(([element, filterKey]) => {
          element.className = filterKey === currentFilter ? 'nav-item active' : 'nav-item';
        });

        updateFilterCounts();
      }

      // `options.skipTags` is set by renderNoteList when a row will render
      // tag chips, so the meta line doesn't show the same tags twice.
      function getNoteSecondaryText(note, options) {
        const skipTags = options && options.skipTags === true;
        const tags = normalizeTags(note.frontmatter?.tags);
        const sourceValue = note.frontmatter?.source ? String(note.frontmatter.source).trim() : '';
        const metadataBits = [];

        if (note.aiImported) {
          metadataBits.push('AI import');
        }

        if (note.source === 'vault' && note.relativePath) {
          metadataBits.push(`path: ${note.relativePath}`);
        } else if (note.source === 'draft') {
          metadataBits.push('unsaved draft');
        }

        if (!skipTags && tags.length > 0) {
          metadataBits.push(`tags: ${tags.join(', ')}`);
        }

        if (sourceValue) {
          metadataBits.push(`source: ${sourceValue}`);
        }

        if (metadataBits.length > 0) {
          return metadataBits.join(' • ');
        }

        if (note.body.trim().length === 0) {
          return 'Empty note';
        }

        return note.body.trim().split('\n')[0].slice(0, 40);
      }

      function renderSearchMeta(visibleResults) {
        const query = currentSearchQuery.trim();

        if (!query) {
          searchMeta.textContent = `Showing ${visibleResults.length} note(s) in the current filter.`;
          return;
        }

        searchMeta.textContent = `Found ${visibleResults.length} result(s) for "${query}" in the current filter.`;
      }

      function renderNoteList() {
        noteList.innerHTML = '';

        const visibleResults = getVisibleResults();
        renderSearchMeta(visibleResults);

        visibleResults.forEach((result) => {
          const note = result.note;
          const item = document.createElement('div');
          item.className = note.id === selectedNoteId ? 'note-item active' : 'note-item';

          const displayTitle = note.title.trim().length === 0 ? 'Untitled note' : note.title;
          // Stage 6.1: dirty vault notes also get the Draft badge.
          const isDirty = window.DirtyState ? window.DirtyState.isNoteDirty(note) : false;
          const badge = window.NoteRow ? window.NoteRow.computeNoteBadge(note, isDirty) : null;
          const tagsInfo = window.NoteRow
            ? window.NoteRow.computeNoteTags(note)
            : { visible: [], overflow: 0 };
          const hasTagChips = tagsInfo.visible.length > 0;
          const secondaryText = getNoteSecondaryText(note, { skipTags: hasTagChips });
          const snippetHtml = result.snippet
            ? `<div class="note-snippet">${highlightText(result.snippet, currentSearchQuery)}</div>`
            : '';

          const badgeHtml = badge
            ? `<span class="note-badge note-badge-${badge.kind}">${escapeHtml(badge.label)}</span>`
            : '';

          let tagsHtml = '';
          if (hasTagChips) {
            const chips = tagsInfo.visible
              .map((t) => `<span class="note-tag">#${escapeHtml(t)}</span>`)
              .join('');
            const overflow = tagsInfo.overflow > 0
              ? `<span class="note-tag-overflow">+${tagsInfo.overflow}</span>`
              : '';
            tagsHtml = `<div class="note-tags">${chips}${overflow}</div>`;
          }

          // Tooltip on the outer row so the (possibly quoted) displayTitle
          // is attribute-encoded by the browser via the DOM property, not by
          // our escapeHtml helper (which doesn't escape `"`). The native
          // `title` attribute cascades to children, so hovering anywhere on
          // the row shows the full title.
          item.title = displayTitle;

          item.innerHTML = `
            <div class="note-row-head">
              <div class="note-title">${highlightText(displayTitle, currentSearchQuery)}</div>
              ${badgeHtml}
            </div>
            <div class="note-meta">${highlightText(secondaryText, currentSearchQuery)}</div>
            ${tagsHtml}
            ${snippetHtml}
          `;

          item.addEventListener('click', () => {
            // Flush any in-progress active-block edit on the OUTGOING note and
            // write the flushed source back so uncommitted textarea / IME
            // composition state is preserved before selectedNoteId changes
            // and renderApp() loads the new note.
            const outgoingNote = getSelectedNote();
            if (liveEditorInstance && outgoingNote) {
              liveEditorInstance.exitWriteMode();
              outgoingNote.body = liveEditorInstance.getText();
            }
            selectedNoteId = note.id;
            renderApp();
            // Stage 6.1: a dirty saved note that the user edited and then
            // switched away from must keep showing Draft when re-selected.
            // Derive from the new selected note's dirty state instead of
            // unconditionally clearing to Ready.
            setStatusFromSelectedNote();
            scrollSelectedNoteIntoView();
          });

          noteList.appendChild(item);
        });

        if (visibleResults.length === 0) {
          noteList.innerHTML = `<div class="note-meta">No search results in this filter.</div>`;
        }
      }

      function renderApp() {
        ensureSelectionMatchesVisibleResults();
        const selectedNote = getSelectedNote();

        updateVaultPathDisplay();
        renderFilterNav();
        renderNoteList();

        if (!selectedNote) {
          titleInput.value  = '';
          autoResizeTitleInput();
          liveEditorInstance.setText('');
          liveEditorLastNoteId = '';
          updateStatusReadouts('');
          // Stage 6.2: visually + functionally disable editing in the
          // no-selection state. The title input is disabled outright; the
          // editor container gets a CSS class that disables pointer events
          // and mutes the surface. handleWriteChange also early-returns
          // when there's no selection (defense-in-depth against keyboard
          // tab focus reaching the editor).
          titleInput.disabled = true;
          liveEditorContainer.classList.add('is-no-selection');
          // Stage 6.1: empty/no-selection state is never dirty.
          setStatusFromSelectedNote();
          return;
        }

        // Stage 6.2: re-enable editing now that we have a selected note.
        titleInput.disabled = false;
        liveEditorContainer.classList.remove('is-no-selection');

        renderEditor(selectedNote);
        // Pass the note body directly rather than reading via
        // liveEditorInstance.getText() — handleWriteChange and
        // updateSelectedNoteFromInputs keep selectedNote.body in sync with
        // the editor, and avoiding getText() here keeps the existing Preview
        // boot/switch flow's getText call counts unchanged.
        updateStatusReadouts(selectedNote.body || '');
        // Stage 6.1: ensure the bottom-right pill is always derived from
        // the selected note's dirty state on every render. Callers that
        // want a meaningful one-shot message (e.g. "Saved: foo.md", "Vault
        // loaded: N note(s)") still call setStatus *after* renderApp, and
        // those messages override this derivation as before.
        setStatusFromSelectedNote();
      }

      function updateSelectedNoteFromInputs() {
        const selectedNote = getSelectedNote();
        if (!selectedNote) return;

        const fullText = liveEditorInstance.getText();
        const { tags, source } = stripMetaPrefix(fullText);

        const rawTitle = titleInput.value;
        const normalizedTitle = normalizeTitleInputValue(rawTitle);
        if (rawTitle !== normalizedTitle) {
          titleInput.value = normalizedTitle;
          autoResizeTitleInput();
        }
        selectedNote.title = normalizedTitle;
        selectedNote.body  = fullText;          // body is now the canonical source
        selectedNote.frontmatter = {
          tags,                                 // mirrored for search + note list
          source                                // mirrored for search + note list
        };

        if (selectedNote.source === 'vault') {
          selectedNote.meta = selectedNote.aiImported ? 'AI import note' : 'File note';
        } else {
          selectedNote.meta = 'Unsaved draft';
        }

        renderApp();
      }

      function handleEdit() {
        updateSelectedNoteFromInputs();
        // Stage 6.1: derive so editing a vault note's title back to its
        // loaded value re-cleans the pill rather than sticking on Draft.
        setStatusFromSelectedNote();
      }

      function createNewNote() {
        const newNote = {
          id: `draft:${nextDraftId}`,
          title: '',
          body: '',
          meta: 'Unsaved draft',
          fileName: '',
          relativePath: '',
          source: 'draft',
          aiImported: false,
          frontmatter: {
            tags:   [],
            source: ''
          }
        };

        nextDraftId += 1;
        notes.unshift(newNote);
        currentFilter = 'drafts';
        currentSearchQuery = '';
        searchInput.value = '';
        selectedNoteId = newNote.id;
        renderApp();
        setStatus('draft', 'New draft created');
        titleInput.focus();
      }

      async function startVaultWatcher() {
        if (!currentVaultPath) {
          return;
        }

        if (stopVaultWatcher) {
          stopVaultWatcher();
          stopVaultWatcher = null;
        }

        const result = await window.vaultApi.watchVaultFolder({
          vaultPath: currentVaultPath
        });

        if (!result.ok) {
          setStatus('error', `Watch failed: ${result.error}`);
          return;
        }

        stopVaultWatcher = window.vaultApi.onVaultChanged(async (payload) => {
          if (!currentVaultPath) {
            return;
          }
          // Stage 6.3B: when Save All is iterating, the disk writes it
          // is making fire fs.watch events that arrive here mid-loop.
          // Letting refreshVaultNotes run during the loop would race
          // the in-flight saves (and clobber unsaved-but-not-yet-saved
          // dirty notes). Save All performs its own single refresh
          // after the loop, so we drop these events.
          if (saveAllInProgress) {
            return;
          }

          const changedPath = String(payload?.fileName || '').replace(/\\/g, '/');
          const looksLikeAiImport = changedPath.toLowerCase().startsWith('inbox/ai chats/');

          const selectedNote = getSelectedNote();
          const preferredRelativePath =
            looksLikeAiImport
              ? changedPath
              : selectedNote && selectedNote.source === 'vault'
              ? selectedNote.relativePath
              : '';

          // The watcher only knows that one file changed on disk; every other
          // vault-backed note is unchanged on disk and must keep its in-memory
          // edits. Without this overlay, a save-triggered watcher event (or any
          // external change to a single file) would silently revert unrelated
          // dirty notes — the same data-loss class as the prior draft-loss bug.
          const preservedVaultEdits = snapshotDirtyVaultEdits(changedPath);

          const refreshed = await refreshVaultNotes(
            preferredRelativePath,
            false,
            null,
            preservedVaultEdits,
            true,
          );

          if (!refreshed) {
            return;
          }

          if (looksLikeAiImport) {
            const matchedNote = notes.find((note) => note.relativePath === changedPath);

            if (matchedNote) {
              currentFilter = 'ai';
              currentSearchQuery = '';
              searchInput.value = '';
              selectedNoteId = matchedNote.id;
              setIngestBanner(changedPath);
              renderApp();
              setStatusFromSelectedNote(`New AI import detected: ${matchedNote.fileName}`);
              return;
            }
          }

          renderApp();
          // Stage 6.1: a watcher refresh that preserves an unrelated dirty
          // vault note must keep that note showing Draft. The disk-truth
          // loadedBody captured during refreshVaultNotes is what makes the
          // dirty derivation correct here.
          setStatusFromSelectedNote('Vault auto-refreshed');
        });
      }

      async function stopWatchingVault() {
        if (stopVaultWatcher) {
          stopVaultWatcher();
          stopVaultWatcher = null;
        }

        await window.vaultApi.unwatchVaultFolder();
      }

      async function chooseVaultFolder() {
        await VaultActions.chooseVaultFolder({
          vaultApi:            window.vaultApi,
          setCurrentVaultPath: (p) => { currentVaultPath = p; },
          stopWatching:        stopWatchingVault,
          startWatching:       startVaultWatcher,
          refreshVaultNotes:   refreshVaultNotes,
          updateDisplay:       updateVaultPathDisplay,
          setStatus:           setStatus,
        });
      }

      async function seedDemoVault() {
        if (!currentVaultPath) {
          setStatus('error', 'Choose a vault first');
          return;
        }

        setStatus('saving', 'Creating demo vault...');

        const result = await window.vaultApi.seedDemoVault({
          vaultPath: currentVaultPath
        });

        if (!result.ok) {
          setStatus('error', `Demo vault failed: ${result.error}`);
          return;
        }

        currentFilter = 'all';
        currentSearchQuery = '';
        searchInput.value = '';

        const refreshed = await refreshVaultNotes('', false);

        if (refreshed) {
          setStatus('ready', `Demo vault created: ${result.createdCount} sample notes`);
        }
      }

      function shouldPreserveDraft(note) {
        // Stage 6.2 revision: align with DirtyState.isNoteDirty for draft
        // notes — a draft is preservable iff its content is meaningful
        // (non-empty body, OR a non-placeholder non-empty title). This
        // matches the contract Stage 6.1 already uses for the Drafts
        // filter, the Draft badge, and the status pill, so empty and
        // whitespace-only drafts are consistently treated as "not work
        // worth preserving".
        if (note.source !== 'draft') return false;
        if (window.DirtyState) {
          return window.DirtyState.isNoteDirty(note);
        }
        // Defensive fallback if DirtyState somehow isn't loaded — the
        // same draft semantics inlined.
        const title = String(note.title == null ? '' : note.title).trim();
        const body  = String(note.body  == null ? '' : note.body ).trim();
        if (body !== '') return true;
        if (title === '' || title === 'Untitled note') return false;
        return true;
      }

      // Snapshot in-memory state for vault-backed notes other than the one whose
      // disk version is about to become canonical (the just-saved file, or the
      // file the watcher reports as changed). Both saveCurrentNote and the
      // vault-watcher callback use this so a refresh never silently reverts a
      // note the user is still typing into.
      function snapshotDirtyVaultEdits(excludeRelativePath = '') {
        return notes
          .filter((note) =>
            note.source === 'vault'
            && note.relativePath
            && note.relativePath !== excludeRelativePath
          )
          .map((note) => ({
            relativePath: note.relativePath,
            title: note.title,
            body: note.body,
            frontmatter: {
              tags:   normalizeTags(note.frontmatter?.tags),
              source: note.frontmatter?.source || '',
            },
          }));
      }

      async function refreshVaultNotes(
        preferredRelativePath = '',
        updateStatus = true,
        preservedDrafts = null,
        preservedVaultEdits = null,
        preserveCachedEditorStates = false
      ) {
        // Stage 6.2: drop the hasLoadedVaultNotes gate. Drafts that the user
        // typed before any vault was selected must survive the FIRST
        // choose-vault refresh. shouldPreserveDraft already filters out the
        // bare "Untitled note" placeholder, so this is safe.
        const draftsToPreserve = Array.isArray(preservedDrafts)
          ? preservedDrafts
          : notes.filter(shouldPreserveDraft);

        // Stage 6.2: if the currently-selected note is a draft that survives
        // preservation, remember its id so post-refresh selection can stay
        // on it instead of jumping to the first vault note. Both the Case A
        // (Save-without-vault) and Case B (Choose Vault directly) flows
        // depend on this to keep the user's in-progress draft selected.
        const previouslySelectedDraftId = (() => {
          if (!selectedNoteId) return '';
          const sel = notes.find((n) => n.id === selectedNoteId);
          if (!sel || sel.source !== 'draft') return '';
          if (!draftsToPreserve.some((d) => d.id === selectedNoteId)) return '';
          return selectedNoteId;
        })();

        // Overlay: in-memory state for vault-backed notes that the caller wants
        // preserved across this refresh, keyed by relativePath. Opt-in — only
        // save and watcher refreshes pass it (they know exactly one file
        // changed on disk and everything else is unchanged). Choose-vault,
        // demo-seed, and manual reload skip the overlay so disk truth wins.
        const vaultOverlay = new Map();
        if (Array.isArray(preservedVaultEdits)) {
          preservedVaultEdits.forEach((entry) => {
            if (entry && entry.relativePath) {
              vaultOverlay.set(entry.relativePath, entry);
            }
          });
        }

        // Cached EditorStates carry note-local undo/redo. Bulk-clearing them on
        // every refresh discarded undo history for unrelated notes whose bodies
        // we just preserved — the body/state pair would survive together with
        // saving but the state was thrown away. Save and watcher refreshes
        // opt in to preservation; the per-entry doc/body mismatch guard in
        // renderEditor() still drops any entry whose body did change. Other
        // refresh paths (manual reload, choose-vault, demo-seed, delete) keep
        // the bulk clear so external/manual reload can invalidate state per
        // the product rule.
        if (!preserveCachedEditorStates) {
          noteEditorStates.clear();
        }

        const result = await window.vaultApi.loadVaultNotes({
          vaultPath: currentVaultPath
        });

        if (!result.ok) {
          setStatus('error', `Load failed: ${result.error}`);
          return false;
        }

        // Stage 6.1: capture loadedBody = disk truth for every vault note,
        // mirroring the existing loadedTitle. The overlay branch preserves
        // the user's in-progress body but loadedBody must come from disk —
        // otherwise an overlay-restored note would always look "clean" and
        // its dirty status would silently disappear across refreshes.
        const refreshedNotes = result.notes.map((diskNote) => {
          const overlay = vaultOverlay.get(diskNote.relativePath);
          if (!overlay) return { ...diskNote, loadedBody: diskNote.body };
          return {
            ...diskNote,
            loadedBody: diskNote.body,
            title: overlay.title,
            body: overlay.body,
            frontmatter: { ...overlay.frontmatter },
          };
        });
        draftsToPreserve.forEach((draft) => {
          if (!refreshedNotes.some((note) => note.id === draft.id)) {
            refreshedNotes.push(draft);
          }
        });

        if (refreshedNotes.length === 0) {
          // Stage 6.2: if the user already has preserved drafts, use them as
          // the entire notes set instead of clobbering with the placeholder
          // Untitled draft. Only fall back to the placeholder when there's
          // truly nothing to show (no vault notes AND no preserved drafts).
          if (draftsToPreserve.length > 0) {
            notes = [...draftsToPreserve];
            if (previouslySelectedDraftId
                && notes.some((n) => n.id === previouslySelectedDraftId)) {
              selectedNoteId = previouslySelectedDraftId;
            } else {
              selectedNoteId = notes[0].id;
            }
          } else {
            notes = [
              {
                id: 'draft:1',
                title: 'Untitled note',
                body: '',
                meta: 'Vault is empty',
                fileName: '',
                relativePath: '',
                source: 'draft',
                aiImported: false,
                frontmatter: {
                  tags: [],
                  source: ''
                }
              }
            ];
            currentFilter = 'all';
            selectedNoteId = 'draft:1';
          }
          nextDraftId = 1;
          while (notes.some((note) => note.id === `draft:${nextDraftId}`)) {
            nextDraftId += 1;
          }
          hasLoadedVaultNotes = true;
          renderApp();

          if (updateStatus) {
            // Stage 6.2: route through the derived helper so a preserved
            // dirty draft (now selected) keeps showing Draft instead of
            // being shadowed by the Vault-loaded message.
            setStatusFromSelectedNote('Vault loaded: 0 notes');
          }

          return true;
        }

        notes = refreshedNotes;
        hasLoadedVaultNotes = true;

        // Stage 6.2: a previously-selected pre-vault draft (now preserved
        // in `notes`) wins over both preferredRelativePath and the
        // first-vault-note default. Otherwise behavior is unchanged.
        if (previouslySelectedDraftId
            && notes.some((n) => n.id === previouslySelectedDraftId)) {
          selectedNoteId = previouslySelectedDraftId;
        } else if (preferredRelativePath) {
          const matchingNote = notes.find((note) => note.relativePath === preferredRelativePath);
          selectedNoteId = matchingNote ? matchingNote.id : notes[0].id;
        } else {
          selectedNoteId = notes[0].id;
        }

        nextDraftId = 1;
        while (notes.some((note) => note.id === `draft:${nextDraftId}`)) {
          nextDraftId += 1;
        }

        renderApp();

        if (updateStatus) {
          // Stage 6.2: see the empty-vault branch above — derived to keep
          // Draft visible for a preserved dirty draft.
          setStatusFromSelectedNote(`Vault loaded: ${notes.length} note(s)`);
        }

        return true;
      }

      async function saveCurrentNote() {
        // Stage 6.2: Save Note from the no-vault state opens the existing
        // Choose Vault flow first. After a successful selection we restore
        // the originally-targeted draft as the selection (refreshVaultNotes
        // already does that when the previously-selected note is a
        // preserved draft) and fall through to the normal save path. If
        // the user cancels the OS picker, currentVaultPath stays empty and
        // we bail out without saving — VaultActions has already set the
        // "Vault selection canceled" status.
        if (!currentVaultPath) {
          const targetSelectedNoteId = selectedNoteId;
          const target = getSelectedNote();
          if (!target) {
            setStatus('error', 'No note selected');
            return;
          }
          await chooseVaultFolder();
          if (!currentVaultPath) {
            // User canceled (or chooseVault errored). VaultActions already
            // emitted the appropriate ready/error status.
            return;
          }
          // Defensive: the preservation path inside refreshVaultNotes already
          // restores selection to the dirty draft, but verify before we
          // attempt to save the wrong note.
          if (selectedNoteId !== targetSelectedNoteId) {
            if (notes.some((n) => n.id === targetSelectedNoteId)) {
              selectedNoteId = targetSelectedNoteId;
              renderApp();
            } else {
              setStatus('error', 'The draft you were saving is no longer available.');
              return;
            }
          }
          // Fall through to the rest of the normal save flow.
        }

        const selectedNote = getSelectedNote();
        if (!selectedNote) {
          setStatus('error', 'No note selected');
          return;
        }

        // Stage 10.2: block save when a draft has no title yet.
        if (selectedNote.source === 'draft' && !String(selectedNote.title || '').trim()) {
          setStatus('error', 'Enter a title to save this note.');
          return;
        }

        // Duplicate-name pre-check: refuse to save if the note's derived
        // relativePath collides with another in-memory note. Three branches:
        //   - draft / new file: candidate from title via deriveDraftRelativePath.
        //   - vault save-in-place (title unchanged from loadedTitle, OR derived
        //     equals current case-insensitively): no candidate, no check.
        //   - vault rename (titleChanged AND derived differs case-insensitively
        //     from current): candidate from deriveRenameRelativePath.
        // The main process still runs the authoritative `wx` write — this
        // renderer-side check is fast feedback, not the safety mechanism.
        if (window.FileName) {
          const sn = selectedNote;
          const isVaultBacked = sn.source === 'vault' && sn.relativePath;
          const loadedTitle = sn.loadedTitle != null ? sn.loadedTitle : sn.title;
          const titleChanged = isVaultBacked && sn.title !== loadedTitle;

          let candidate = '';
          if (!isVaultBacked) {
            candidate = window.FileName.deriveDraftRelativePath(sn.title);
          } else if (titleChanged) {
            const derived = window.FileName.deriveRenameRelativePath(sn.relativePath, sn.title);
            if (derived.toLowerCase() !== String(sn.relativePath).toLowerCase()) {
              candidate = derived;
            }
          }

          if (candidate) {
            const conflict = window.FileName.findRelativePathConflict({
              notes,
              candidateRelativePath: candidate,
              excludeId: sn.id,
            });
            if (conflict) {
              setStatus(
                'error',
                `A note named "${candidate}" already exists in this vault. Rename your note to save without overwriting.`
              );
              return;
            }
          }
        }

        setStatus('saving', 'Saving...');

        // Flush any in-progress active-block edit so getText() returns the
        // committed source before we send it to disk.
        liveEditorInstance.exitWriteMode();
        const savedBody = liveEditorInstance.getText();
        selectedNote.body = savedBody;
        const preservedDrafts = notes.filter((note) =>
          note.id !== selectedNote.id && shouldPreserveDraft(note)
        );
        // Snapshot in-memory state for every other vault-backed note so the
        // post-save refresh does not silently revert their unsaved edits to
        // disk truth. The selected note is excluded — the freshly-saved disk
        // version is canonical for it.
        const preservedVaultEdits = snapshotDirtyVaultEdits(selectedNote.relativePath || '');

        const result = await window.vaultApi.saveNote({
          vaultPath: currentVaultPath,
          note: {
            title: selectedNote.title,
            // Baseline that lets main.js detect intentional title changes.
            // Defaults to title so the rename gate is no-op when missing.
            loadedTitle: selectedNote.loadedTitle != null
              ? selectedNote.loadedTitle
              : selectedNote.title,
            body:  savedBody,
            source: selectedNote.source,
            fileName: selectedNote.fileName,
            relativePath: selectedNote.relativePath,
            frontmatter: {
              tags:   normalizeTags(selectedNote.frontmatter?.tags),
              source: selectedNote.frontmatter?.source || ''
            }
          }
        });

        if (!result.ok) {
          setStatus('error', `Save failed: ${result.error}`);
          return;
        }

        // Realign liveEditorLastNoteId BEFORE the post-save refresh so the
        // upcoming renderEditor sees the same id and noops. That preserves
        // the live CM6 EditorState (with its undo/redo history) across the
        // id change AND prevents the per-note view-state capture/restore
        // from running with stale ids. Fires on ANY id change — both rename
        // (vault:a.md → vault:b.md) and draft → vault (draft:N → vault:foo.md).
        if (result.ok && result.relativePath) {
          const oldId = selectedNote.id;
          const newId = `vault:${result.relativePath}`;
          if (oldId !== newId) {
            // Drop the now-defunct CM6 cache entry. The live editor state is
            // preserved via the liveEditorLastNoteId realignment below; no
            // migration of noteEditorStates needed.
            noteEditorStates.delete(oldId);
            // Migrate per-note view state (mode + scrollRatio) so the next
            // visit to this note (under its new id) restores the user's
            // saved view rather than resetting to the default Write/0.
            if (noteViewStates.has(oldId)) {
              noteViewStates.set(newId, noteViewStates.get(oldId));
              noteViewStates.delete(oldId);
            }
            liveEditorLastNoteId = newId;
          }
        }

        const refreshed = await refreshVaultNotes(
          result.relativePath,
          false,
          preservedDrafts,
          preservedVaultEdits,
          true,
        );

        if (refreshed) {
          setStatus('ready', `Saved: ${result.fileName}`);
        }
      }

      async function loadVaultNotes() {
        if (!currentVaultPath) {
          setStatus('error', 'Choose a vault first');
          return;
        }

        setStatus('saving', 'Loading vault...');
        await refreshVaultNotes();
      }

      function deleteDraftNote() {
        const selectedNote = getSelectedNote();
        if (!selectedNote) {
          setStatus('error', 'No note selected');
          return;
        }

        const confirmed = window.confirm(
          `Delete draft note "${selectedNote.title || 'Untitled note'}"?`
        );

        if (!confirmed) {
          setStatus('ready', 'Delete canceled');
          return;
        }

        notes = notes.filter((note) => note.id !== selectedNote.id);
        noteEditorStates.delete(selectedNote.id);
        noteViewStates.delete(selectedNote.id);

        if (notes.length === 0) {
          const fallbackNote = {
            id: `draft:${nextDraftId}`,
            title: 'Untitled note',
            body: '',
            meta: 'Unsaved draft',
            fileName: '',
            relativePath: '',
            source: 'draft',
            aiImported: false,
            frontmatter: {
              tags: [],
              source: ''
            }
          };
          nextDraftId += 1;
          notes = [fallbackNote];
          selectedNoteId = fallbackNote.id;
          currentFilter = 'drafts';
        } else {
          selectedNoteId = notes[0].id;
        }

        renderApp();
        setStatus('ready', 'Draft deleted');
      }

      async function deleteFileBackedNote() {
        if (!currentVaultPath) {
          setStatus('error', 'Choose a vault first');
          return;
        }

        const selectedNote = getSelectedNote();
        if (!selectedNote) {
          setStatus('error', 'No note selected');
          return;
        }

        const confirmed = window.confirm(
          `Delete file-backed note "${selectedNote.title || 'Untitled note'}"?\n\nThis will remove ${selectedNote.relativePath || selectedNote.fileName} from the selected vault.`
        );

        if (!confirmed) {
          setStatus('ready', 'Delete canceled');
          return;
        }

        setStatus('saving', 'Deleting...');

        const result = await window.vaultApi.deleteNoteFile({
          vaultPath: currentVaultPath,
          relativePath: selectedNote.relativePath
        });

        if (!result.ok) {
          setStatus('error', `Delete failed: ${result.error}`);
          return;
        }

        // Symmetric cleanup: drop the deleted note's per-note caches before
        // the post-delete refresh re-loads the notes list.
        noteEditorStates.delete(selectedNote.id);
        noteViewStates.delete(selectedNote.id);

        const refreshed = await refreshVaultNotes('', false);

        if (refreshed) {
          setStatus('ready', `Deleted: ${result.fileName}`);
        }
      }

      async function deleteCurrentNote() {
        const selectedNote = getSelectedNote();

        if (!selectedNote) {
          setStatus('error', 'No note selected');
          return;
        }

        if (selectedNote.source === 'vault') {
          await deleteFileBackedNote();
        } else {
          deleteDraftNote();
        }
      }

      function setFilter(filterKey) {
        currentFilter = filterKey;
        renderApp();
        // Stage 6.1: a dirty selected note must keep showing Draft after
        // a filter change. setStatusFromSelectedNote routes through dirty
        // first; the contextual message only wins if the selection is clean.
