<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Vault App</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f5f7;
        color: #1f2328;
        height: 100vh;
        overflow: hidden;
      }

      .app-shell {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      .topbar {
        min-height: 64px;
        background: #ffffff;
        border-bottom: 1px solid #d8dee4;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 16px;
        gap: 12px;
      }

      .topbar-left {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .topbar-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .topbar-title {
        font-size: 16px;
        font-weight: 600;
      }

      .topbar-status {
        font-size: 13px;
        color: #57606a;
      }

      .status-draft {
        color: #b54708;
        font-weight: 600;
      }

      .status-ready {
        color: #1a7f37;
        font-weight: 600;
      }

      .status-saving {
        color: #0969da;
        font-weight: 600;
      }

      .status-error {
        color: #cf222e;
        font-weight: 600;
      }

      .action-button,
      .template-select {
        border: 1px solid #cdd9e5;
        background: #ffffff;
        color: #1f2328;
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 600;
      }

      .action-button {
        cursor: pointer;
      }

      .action-button:hover {
        background: #f6f8fa;
      }

      .template-select {
        cursor: pointer;
      }

      .vault-path {
        font-size: 12px;
        color: #57606a;
        max-width: 520px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .main-layout {
        flex: 1;
        display: grid;
        grid-template-columns: 220px 260px 1fr;
        min-height: 0;
      }

      .panel {
        border-right: 1px solid #d8dee4;
        background: #ffffff;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .panel:last-child {
        border-right: none;
      }

      .panel-header {
        padding: 14px 16px;
        font-size: 13px;
        font-weight: 600;
        color: #57606a;
        border-bottom: 1px solid #eaeef2;
        background: #fafbfc;
      }

      .panel-body {
        padding: 12px;
        overflow: auto;
        flex: 1;
      }

      .nav-item {
        padding: 10px 12px;
        margin-bottom: 8px;
        border-radius: 10px;
        background: #f6f8fa;
      }

      .nav-item.active {
        background: #ddefff;
      }

      .nav-label {
        font-size: 14px;
        font-weight: 500;
      }

      .note-item {
        padding: 10px 12px;
        margin-bottom: 8px;
        border-radius: 10px;
        background: #f6f8fa;
        cursor: pointer;
      }

      .note-item.active {
        background: #ddefff;
      }

      .note-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .note-meta {
        font-size: 12px;
        color: #57606a;
      }

      .workspace {
        display: grid;
        grid-template-rows: 1fr 1fr;
        min-height: 0;
      }

      .workspace-panel {
        background: #ffffff;
        display: flex;
        flex-direction: column;
        border-bottom: 1px solid #d8dee4;
      }

      .workspace-panel:last-child {
        border-bottom: none;
      }

      .workspace-body {
        padding: 16px;
        flex: 1;
        overflow: auto;
      }

      .editor-stack {
        display: flex;
        flex-direction: column;
        gap: 12px;
        height: 100%;
      }

      .title-input,
      .meta-input {
        width: 100%;
        border: 1px solid #cdd9e5;
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 14px;
        outline: none;
        background: #fbfcfe;
      }

      .title-input {
        font-size: 20px;
        font-weight: 600;
        padding: 14px 16px;
      }

      .title-input:focus,
      .meta-input:focus,
      .editor-textarea:focus {
        border-color: #4c8bf5;
        box-shadow: 0 0 0 3px rgba(76, 139, 245, 0.15);
      }

      .meta-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .meta-label {
        display: block;
        font-size: 12px;
        color: #57606a;
        margin-bottom: 6px;
      }

      .editor-textarea {
        width: 100%;
        flex: 1;
        resize: none;
        border: 1px solid #cdd9e5;
        border-radius: 14px;
        padding: 16px;
        font-size: 15px;
        line-height: 1.6;
        font-family: "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
        background: #fbfcfe;
        color: #1f2328;
        outline: none;
      }

      .helper-line {
        font-size: 12px;
        color: #57606a;
      }

      .preview-box {
        height: 100%;
        border: 1px solid #cdd9e5;
        border-radius: 14px;
        background: #fbfcfe;
        padding: 18px;
        overflow: auto;
      }

      .preview-frontmatter {
        margin-bottom: 16px;
        padding: 12px;
        background: #eef5ff;
        border-radius: 10px;
        font-size: 13px;
        color: #334155;
      }

      .preview-frontmatter strong {
        color: #0f172a;
      }

      .preview-title {
        margin: 0 0 16px 0;
        font-size: 24px;
        font-weight: 700;
      }

      .preview-markdown {
        line-height: 1.7;
      }

      .preview-markdown h1,
      .preview-markdown h2,
      .preview-markdown h3 {
        margin-top: 1.2em;
        margin-bottom: 0.5em;
      }

      .preview-markdown h1:first-child,
      .preview-markdown h2:first-child,
      .preview-markdown h3:first-child {
        margin-top: 0;
      }

      .preview-markdown p {
        margin: 0 0 1em 0;
      }

      .preview-markdown ul,
      .preview-markdown ol {
        padding-left: 1.5em;
        margin: 0 0 1em 0;
      }

      .preview-markdown code {
        background: #eef2f6;
        padding: 2px 6px;
        border-radius: 6px;
        font-size: 0.95em;
      }

      .preview-markdown pre {
        background: #eef2f6;
        padding: 12px;
        border-radius: 10px;
        overflow: auto;
      }

      .preview-markdown blockquote {
        border-left: 4px solid #cdd9e5;
        padding-left: 12px;
        margin-left: 0;
        color: #57606a;
      }

      .preview-empty {
        color: #57606a;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-left">
          <div class="topbar-title">Markdown Vault App</div>
          <button id="chooseVaultButton" class="action-button">Choose Vault</button>

          <select id="templateSelect" class="template-select">
            <option value="blank">Blank Note</option>
            <option value="daily">Daily Note</option>
            <option value="meeting">Meeting Note</option>
            <option value="idea">Idea Note</option>
          </select>

          <button id="newNoteButton" class="action-button">New Note</button>
          <button id="saveNoteButton" class="action-button">Save Note</button>
          <button id="deleteNoteButton" class="action-button">Delete Note</button>
          <button id="loadVaultButton" class="action-button">Load Vault</button>
        </div>

        <div class="topbar-right">
          <div id="vaultPathText" class="vault-path">Vault: not selected</div>
          <div id="statusText" class="topbar-status status-ready">Ready</div>
        </div>
      </header>

      <main class="main-layout">
        <aside class="panel">
          <div class="panel-header">Navigation</div>
          <div class="panel-body">
            <div class="nav-item active"><div class="nav-label">Vault Home</div></div>
            <div class="nav-item"><div class="nav-label">Inbox</div></div>
            <div class="nav-item"><div class="nav-label">Projects</div></div>
            <div class="nav-item"><div class="nav-label">AI Imports</div></div>
            <div class="nav-item"><div class="nav-label">Settings</div></div>
          </div>
        </aside>

        <section class="panel">
          <div class="panel-header">Notes</div>
          <div id="noteList" class="panel-body"></div>
        </section>

        <section class="workspace">
          <div class="workspace-panel">
            <div class="panel-header">Editor</div>
            <div class="workspace-body">
              <div class="editor-stack">
                <input
                  id="titleInput"
                  class="title-input"
                  type="text"
                  placeholder="Untitled note"
                />

                <div class="meta-row">
                  <div>
                    <label class="meta-label" for="tagsInput">Tags (comma-separated)</label>
                    <input
                      id="tagsInput"
                      class="meta-input"
                      type="text"
                      placeholder="ai, notes, project"
                    />
                  </div>

                  <div>
                    <label class="meta-label" for="sourceInput">Source</label>
                    <input
                      id="sourceInput"
                      class="meta-input"
                      type="text"
                      placeholder="claude, codex, manual"
                    />
                  </div>
                </div>

                <textarea
                  id="bodyInput"
                  class="editor-textarea"
                  placeholder="Start writing your note..."
                ></textarea>

                <div class="helper-line">
                  Lightweight frontmatter is now supported for tags and source.
                </div>
              </div>
            </div>
          </div>

          <div class="workspace-panel">
            <div class="panel-header">Preview</div>
            <div class="workspace-body">
              <div class="preview-box">
                <div id="previewFrontmatter" class="preview-frontmatter"></div>
                <h1 id="previewTitle" class="preview-title"></h1>
                <div id="previewBody" class="preview-markdown"></div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./node_modules/marked/lib/marked.umd.js"></script>

    <script>
      marked.use({ breaks: false });

      function escapeHtml(text) {
        return text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function normalizeTags(value) {
        if (!value) return [];

        if (Array.isArray(value)) {
          return value.map((item) => String(item).trim()).filter(Boolean);
        }

        return String(value)
          .split(',')
          .map((item) => item.trim())
          .filter(Boolean);
      }

      const templates = {
        blank: {
          title: 'Untitled note',
          body: '',
          frontmatter: {
            tags: [],
            source: ''
          }
        },
        daily: {
          title: 'Daily Note',
          body: `# Daily Note

## Top priorities
- 

## Notes
- 

## Reflection
- `,
          frontmatter: {
            tags: ['daily'],
            source: 'manual'
          }
        },
        meeting: {
          title: 'Meeting Note',
          body: `# Meeting Note

## Attendees
- 

## Agenda
- 

## Decisions
- 

## Action Items
- `,
          frontmatter: {
            tags: ['meeting'],
            source: 'manual'
          }
        },
        idea: {
          title: 'Idea Note',
          body: `# Idea Note

## Idea
Write the core idea here.

## Why it matters
- 

## Next steps
- `,
          frontmatter: {
            tags: ['idea'],
            source: 'manual'
          }
        }
      };

      const titleInput = document.getElementById('titleInput');
      const tagsInput = document.getElementById('tagsInput');
      const sourceInput = document.getElementById('sourceInput');
      const bodyInput = document.getElementById('bodyInput');
      const previewFrontmatter = document.getElementById('previewFrontmatter');
      const previewTitle = document.getElementById('previewTitle');
      const previewBody = document.getElementById('previewBody');
      const statusText = document.getElementById('statusText');
      const vaultPathText = document.getElementById('vaultPathText');
      const chooseVaultButton = document.getElementById('chooseVaultButton');
      const templateSelect = document.getElementById('templateSelect');
      const newNoteButton = document.getElementById('newNoteButton');
      const saveNoteButton = document.getElementById('saveNoteButton');
      const deleteNoteButton = document.getElementById('deleteNoteButton');
      const loadVaultButton = document.getElementById('loadVaultButton');
      const noteList = document.getElementById('noteList');

      let stopVaultWatcher = null;
      let currentVaultPath = '';
      let notes = [
        {
          id: 'draft:1',
          title: 'Welcome to Markdown Vault App',
          body: `# Day 17

Today the app supports lightweight frontmatter.

## Goal
- parse tags
- parse source
- display them clearly`,
          meta: 'Unsaved draft',
          fileName: '',
          source: 'draft',
          frontmatter: {
            tags: ['metadata', 'frontmatter'],
            source: 'manual'
          }
        }
      ];
      let selectedNoteId = 'draft:1';
      let nextDraftId = 2;

      function getSelectedNote() {
        return notes.find((note) => note.id === selectedNoteId);
      }

      function setStatus(mode, message) {
        if (mode === 'draft') {
          statusText.textContent = message || 'Draft';
          statusText.className = 'topbar-status status-draft';
        } else if (mode === 'saving') {
          statusText.textContent = message || 'Working...';
          statusText.className = 'topbar-status status-saving';
        } else if (mode === 'error') {
          statusText.textContent = message || 'Error';
          statusText.className = 'topbar-status status-error';
        } else {
          statusText.textContent = message || 'Ready';
          statusText.className = 'topbar-status status-ready';
        }
      }

      function updateVaultPathDisplay() {
        if (!currentVaultPath) {
          vaultPathText.textContent = 'Vault: not selected';
        } else {
          vaultPathText.textContent = `Vault: ${currentVaultPath}`;
        }
      }

      function renderFrontmatterPreview(note) {
        const tags = normalizeTags(note.frontmatter?.tags);
        const source = note.frontmatter?.source ? String(note.frontmatter.source).trim() : '';

        if (tags.length === 0 && !source) {
          previewFrontmatter.innerHTML = '<strong>Frontmatter:</strong> none';
          return;
        }

        const parts = [];

        if (tags.length > 0) {
          parts.push(`<strong>Tags:</strong> ${escapeHtml(tags.join(', '))}`);
        }

        if (source) {
          parts.push(`<strong>Source:</strong> ${escapeHtml(source)}`);
        }

        previewFrontmatter.innerHTML = parts.join('<br />');
      }

      function renderPreview(note) {
        const titleValue = note.title.trim();
        const bodyValue = note.body.trim();

        renderFrontmatterPreview(note);
        previewTitle.textContent = titleValue.length === 0 ? 'Untitled note' : note.title;

        if (bodyValue.length === 0) {
          previewBody.innerHTML =
            '<div class="preview-empty">This note body is empty. Start typing in the editor.</div>';
        } else {
          previewBody.innerHTML = marked.parse(escapeHtml(note.body));
        }
      }

      function renderEditor(note) {
        titleInput.value = note.title;
        tagsInput.value = normalizeTags(note.frontmatter?.tags).join(', ');
        sourceInput.value = note.frontmatter?.source || '';
        bodyInput.value = note.body;
      }

      function getNoteSecondaryText(note) {
        const tags = normalizeTags(note.frontmatter?.tags);
        const source = note.frontmatter?.source ? String(note.frontmatter.source).trim() : '';

        if (note.source === 'vault' && note.fileName) {
          const metadataBits = [];

          metadataBits.push(`file: ${note.fileName}`);

          if (tags.length > 0) {
            metadataBits.push(`tags: ${tags.join(', ')}`);
          }

          if (source) {
            metadataBits.push(`source: ${source}`);
          }

          return metadataBits.join(' • ');
        }

        if (note.source === 'draft') {
          const metadataBits = ['unsaved draft'];

          if (tags.length > 0) {
            metadataBits.push(`tags: ${tags.join(', ')}`);
          }

          if (source) {
            metadataBits.push(`source: ${source}`);
          }

          return metadataBits.join(' • ');
        }

        if (note.meta) {
          return note.meta;
        }

        if (note.body.trim().length === 0) {
          return 'Empty note';
        }

        return note.body.trim().split('\n')[0].slice(0, 40);
      }

      function renderNoteList() {
        noteList.innerHTML = '';

        notes.forEach((note) => {
          const item = document.createElement('div');
          item.className = note.id === selectedNoteId ? 'note-item active' : 'note-item';

          const displayTitle = note.title.trim().length === 0 ? 'Untitled note' : note.title;
          const secondaryText = getNoteSecondaryText(note);

          item.innerHTML = `
            <div class="note-title">${displayTitle}</div>
            <div class="note-meta">${escapeHtml(secondaryText)}</div>
          `;

          item.addEventListener('click', () => {
            selectedNoteId = note.id;
            renderApp();
            setStatus('ready', 'Ready');
          });

          noteList.appendChild(item);
        });
      }

      function renderApp() {
        const selectedNote = getSelectedNote();
        updateVaultPathDisplay();
        renderNoteList();

        if (!selectedNote) {
          previewFrontmatter.innerHTML = '<strong>Frontmatter:</strong> none';
          previewTitle.textContent = 'No note selected';
          previewBody.innerHTML =
            '<div class="preview-empty">Create a new note or load a vault note.</div>';
          titleInput.value = '';
          tagsInput.value = '';
          sourceInput.value = '';
          bodyInput.value = '';
          return;
        }

        renderEditor(selectedNote);
        renderPreview(selectedNote);
      }

      function updateSelectedNoteFromInputs() {
        const selectedNote = getSelectedNote();
        if (!selectedNote) return;

        selectedNote.title = titleInput.value;
        selectedNote.body = bodyInput.value;
        selectedNote.frontmatter = {
          tags: normalizeTags(tagsInput.value),
          source: sourceInput.value.trim()
        };

        if (selectedNote.source === 'vault') {
          selectedNote.meta = 'File note';
        } else {
          selectedNote.meta = 'Unsaved draft';
        }

        renderNoteList();
        renderPreview(selectedNote);
      }

      function handleEdit() {
        updateSelectedNoteFromInputs();
        setStatus('draft', 'Draft');
      }

      function getSelectedTemplate() {
        const selectedKey = templateSelect.value;
        return templates[selectedKey] || templates.blank;
      }

      function createNewNote() {
        const template = getSelectedTemplate();

        const newNote = {
          id: `draft:${nextDraftId}`,
          title: template.title,
          body: template.body,
          meta: 'Unsaved draft',
          source: 'draft',
          fileName: '',
          frontmatter: {
            tags: normalizeTags(template.frontmatter?.tags),
            source: template.frontmatter?.source || ''
          }
        };

        nextDraftId += 1;
        notes.unshift(newNote);
        selectedNoteId = newNote.id;
        renderApp();
        setStatus('draft', `Draft created from template: ${templateSelect.value}`);
        titleInput.focus();
        titleInput.select();
      }

      async function startVaultWatcher() {
        if (!currentVaultPath) {
          return;
        }

        if (stopVaultWatcher) {
          stopVaultWatcher();
          stopVaultWatcher = null;
        }

        const result = await window.vaultApi.watchVaultFolder({
          vaultPath: currentVaultPath
        });

        if (!result.ok) {
          setStatus('error', `Watch failed: ${result.error}`);
          return;
        }

        stopVaultWatcher = window.vaultApi.onVaultChanged(async () => {
          if (!currentVaultPath) {
            return;
          }

          const selectedNote = getSelectedNote();
          const preferredFileName =
            selectedNote && selectedNote.source === 'vault'
              ? selectedNote.fileName
              : '';

          const refreshed = await refreshVaultNotes(preferredFileName, false);

          if (refreshed) {
            setStatus('ready', 'Vault auto-refreshed');
          }
        });
      }

      async function stopWatchingVault() {
        if (stopVaultWatcher) {
          stopVaultWatcher();
          stopVaultWatcher = null;
        }

        await window.vaultApi.unwatchVaultFolder();
      }

      async function chooseVaultFolder() {
        setStatus('saving', 'Choosing vault...');

        const result = await window.vaultApi.chooseVaultFolder();

        if (!result.ok) {
          if (result.canceled) {
            setStatus('ready', 'Vault selection canceled');
          } else {
            setStatus('error', `Choose vault failed: ${result.error}`);
          }
          return;
        }

        await stopWatchingVault();

        currentVaultPath = result.vaultPath;
        updateVaultPathDisplay();
        await startVaultWatcher();
        setStatus('ready', 'Vault selected');
      }

      async function refreshVaultNotes(preferredFileName = '', updateStatus = true) {
        const result = await window.vaultApi.loadVaultNotes({
          vaultPath: currentVaultPath
        });

        if (!result.ok) {
          setStatus('error', `Load failed: ${result.error}`);
          return false;
        }

        if (result.notes.length === 0) {
          notes = [
            {
              id: 'draft:1',
              title: 'Untitled note',
              body: '',
              meta: 'Vault is empty',
              source: 'draft',
              fileName: '',
              frontmatter: {
                tags: [],
                source: ''
              }
            }
          ];
          selectedNoteId = 'draft:1';
          nextDraftId = 2;
          renderApp();

          if (updateStatus) {
            setStatus('ready', 'Vault loaded: 0 notes');
          }

          return true;
        }

        notes = result.notes;

        if (preferredFileName) {
          const matchingNote = notes.find((note) => note.fileName === preferredFileName);
          selectedNoteId = matchingNote ? matchingNote.id : notes[0].id;
        } else {
          selectedNoteId = notes[0].id;
        }

        nextDraftId = 1;
        while (notes.some((note) => note.id === `draft:${nextDraftId}`)) {
          nextDraftId += 1;
        }

        renderApp();

        if (updateStatus) {
          setStatus('ready', `Vault loaded: ${notes.length} note(s)`);
        }

        return true;
      }

      async function saveCurrentNote() {
        if (!currentVaultPath) {
          setStatus('error', 'Choose a vault first');
          return;
        }

        const selectedNote = getSelectedNote();
        if (!selectedNote) {
          setStatus('error', 'No note selected');
          return;
        }

        setStatus('saving', 'Saving...');

        const result = await window.vaultApi.saveNote({
          vaultPath: currentVaultPath,
          note: {
            title: selectedNote.title,
            body: selectedNote.body,
            source: selectedNote.source,
            fileName: selectedNote.fileName,
            frontmatter: {
              tags: normalizeTags(selectedNote.frontmatter?.tags),
              source: selectedNote.frontmatter?.source || ''
            }
          }
        });

        if (!result.ok) {
          setStatus('error', `Save failed: ${result.error}`);
          return;
        }

        const refreshed = await refreshVaultNotes(result.fileName, false);

        if (refreshed) {
          setStatus('ready', `Saved: ${result.fileName}`);
        }
      }

      async function loadVaultNotes() {
        if (!currentVaultPath) {
          setStatus('error', 'Choose a vault first');
          return;
        }

        setStatus('saving', 'Loading vault...');
        await refreshVaultNotes();
      }

      function deleteDraftNote() {
        const selectedNote = getSelectedNote();
        if (!selectedNote) {
          setStatus('error', 'No note selected');
          return;
        }

        const confirmed = window.confirm(
          `Delete draft note "${selectedNote.title || 'Untitled note'}"?`
        );

        if (!confirmed) {
          setStatus('ready', 'Delete canceled');
          return;
        }

        notes = notes.filter((note) => note.id !== selectedNote.id);

        if (notes.length === 0) {
          const fallbackNote = {
            id: `draft:${nextDraftId}`,
            title: 'Untitled note',
            body: '',
            meta: 'Unsaved draft',
            source: 'draft',
            fileName: '',
            frontmatter: {
              tags: [],
              source: ''
            }
          };
          nextDraftId += 1;
          notes = [fallbackNote];
          selectedNoteId = fallbackNote.id;
        } else {
          selectedNoteId = notes[0].id;
        }

        renderApp();
        setStatus('ready', 'Draft deleted');
      }

      async function deleteFileBackedNote() {
        if (!currentVaultPath) {
          setStatus('error', 'Choose a vault first');
          return;
        }

        const selectedNote = getSelectedNote();
        if (!selectedNote) {
          setStatus('error', 'No note selected');
          return;
        }

        const confirmed = window.confirm(
          `Delete file-backed note "${selectedNote.title || 'Untitled note'}"?\n\nThis will remove ${selectedNote.fileName} from the selected vault.`
        );

        if (!confirmed) {
          setStatus('ready', 'Delete canceled');
          return;
        }

        setStatus('saving', 'Deleting...');

        const result = await window.vaultApi.deleteNoteFile({
          vaultPath: currentVaultPath,
          fileName: selectedNote.fileName
        });

        if (!result.ok) {
          setStatus('error', `Delete failed: ${result.error}`);
          return;
        }

        const refreshed = await refreshVaultNotes('', false);

        if (refreshed) {
          setStatus('ready', `Deleted: ${result.fileName}`);
        }
      }

      async function deleteCurrentNote() {
        const selectedNote = getSelectedNote();

        if (!selectedNote) {
          setStatus('error', 'No note selected');
          return;
        }

        if (selectedNote.source === 'vault') {
          await deleteFileBackedNote();
        } else {
          deleteDraftNote();
        }
      }

      window.addEventListener('beforeunload', () => {
        stopWatchingVault();
      });

      titleInput.addEventListener('input', handleEdit);
      tagsInput.addEventListener('input', handleEdit);
      sourceInput.addEventListener('input', handleEdit);
      bodyInput.addEventListener('input', handleEdit);
      chooseVaultButton.addEventListener('click', chooseVaultFolder);
      newNoteButton.addEventListener('click', createNewNote);
      saveNoteButton.addEventListener('click', saveCurrentNote);
      deleteNoteButton.addEventListener('click', deleteCurrentNote);
      loadVaultButton.addEventListener('click', loadVaultNotes);

      renderApp();
      updateVaultPathDisplay();
      setStatus('ready', 'Ready');
    </script>
  </body>
</html>
