<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Vault App</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f5;
        color: #222;
      }

      .container {
        max-width: 900px;
        margin: 80px auto;
        padding: 32px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin-top: 0;
      }

      .status {
        margin-top: 24px;
        padding: 16px;
        background: #eef6ff;
        border-radius: 12px;
      }

      code {
        background: #f0f0f0;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Markdown Vault App</h1>
      <p>This is the Day 2 Electron app skeleton.</p>

      <div class="status">
        <strong>Current status:</strong>
        <p>The desktop window is running successfully on macOS.</p>
        <p>Next steps will add the real editor, vault browsing, and local note handling.</p>
      </div>

      <p>Project path: <code>apps/desktop</code></p>
    </div>
  </body>
</html>
