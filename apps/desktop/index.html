<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Vault App</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f5f7;
        color: #1f2328;
        height: 100vh;
        overflow: hidden;
      }

      .app-shell {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      .topbar {
        height: 56px;
        background: #ffffff;
        border-bottom: 1px solid #d8dee4;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        gap: 12px;
      }

      .topbar-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .topbar-title {
        font-size: 16px;
        font-weight: 600;
      }

      .topbar-status {
        font-size: 13px;
        color: #57606a;
      }

      .status-draft {
        color: #b54708;
        font-weight: 600;
      }

      .status-ready {
        color: #1a7f37;
        font-weight: 600;
      }

      .status-saving {
        color: #0969da;
        font-weight: 600;
      }

      .status-error {
        color: #cf222e;
        font-weight: 600;
      }

      .action-button {
        border: 1px solid #cdd9e5;
        background: #ffffff;
        color: #1f2328;
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .action-button:hover {
        background: #f6f8fa;
      }

      .main-layout {
        flex: 1;
        display: grid;
        grid-template-columns: 220px 260px 1fr;
        min-height: 0;
      }

      .panel {
        border-right: 1px solid #d8dee4;
        background: #ffffff;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .panel:last-child {
        border-right: none;
      }

      .panel-header {
        padding: 14px 16px;
        font-size: 13px;
        font-weight: 600;
        color: #57606a;
        border-bottom: 1px solid #eaeef2;
        background: #fafbfc;
      }

      .panel-body {
        padding: 12px;
        overflow: auto;
        flex: 1;
      }

      .nav-item {
        padding: 10px 12px;
        margin-bottom: 8px;
        border-radius: 10px;
        background: #f6f8fa;
      }

      .nav-item.active {
        background: #ddefff;
      }

      .nav-label {
        font-size: 14px;
        font-weight: 500;
      }

      .note-item {
        padding: 10px 12px;
        margin-bottom: 8px;
        border-radius: 10px;
        background: #f6f8fa;
        cursor: pointer;
      }

      .note-item.active {
        background: #ddefff;
      }

      .note-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .note-meta {
        font-size: 12px;
        color: #57606a;
      }

      .workspace {
        display: grid;
        grid-template-rows: 1fr 1fr;
        min-height: 0;
      }

      .workspace-panel {
        background: #ffffff;
        display: flex;
        flex-direction: column;
        border-bottom: 1px solid #d8dee4;
      }

      .workspace-panel:last-child {
        border-bottom: none;
      }

      .workspace-body {
        padding: 16px;
        flex: 1;
        overflow: auto;
      }

      .editor-stack {
        display: flex;
        flex-direction: column;
        gap: 12px;
        height: 100%;
      }

      .title-input {
        width: 100%;
        border: 1px solid #cdd9e5;
        border-radius: 12px;
        padding: 14px 16px;
        font-size: 20px;
        font-weight: 600;
        outline: none;
        background: #fbfcfe;
      }

      .title-input:focus,
      .editor-textarea:focus {
        border-color: #4c8bf5;
        box-shadow: 0 0 0 3px rgba(76, 139, 245, 0.15);
      }

      .editor-textarea {
        width: 100%;
        flex: 1;
        resize: none;
        border: 1px solid #cdd9e5;
        border-radius: 14px;
        padding: 16px;
        font-size: 15px;
        line-height: 1.6;
        font-family: "SFMono-Regular", Menlo, Monaco, Consolas, monospace;
        background: #fbfcfe;
        color: #1f2328;
        outline: none;
      }

      .helper-line {
        font-size: 12px;
        color: #57606a;
      }

      .preview-box {
        height: 100%;
        border: 1px solid #cdd9e5;
        border-radius: 14px;
        background: #fbfcfe;
        padding: 18px;
        overflow: auto;
      }

      .preview-title {
        margin: 0 0 16px 0;
        font-size: 24px;
        font-weight: 700;
      }

      .preview-markdown {
        line-height: 1.7;
      }

      .preview-markdown h1,
      .preview-markdown h2,
      .preview-markdown h3 {
        margin-top: 1.2em;
        margin-bottom: 0.5em;
      }

      .preview-markdown h1:first-child,
      .preview-markdown h2:first-child,
      .preview-markdown h3:first-child {
        margin-top: 0;
      }

      .preview-markdown p {
        margin: 0 0 1em 0;
      }

      .preview-markdown ul,
      .preview-markdown ol {
        padding-left: 1.5em;
        margin: 0 0 1em 0;
      }

      .preview-markdown code {
        background: #eef2f6;
        padding: 2px 6px;
        border-radius: 6px;
        font-size: 0.95em;
      }

      .preview-markdown pre {
        background: #eef2f6;
        padding: 12px;
        border-radius: 10px;
        overflow: auto;
      }

      .preview-markdown blockquote {
        border-left: 4px solid #cdd9e5;
        padding-left: 12px;
        margin-left: 0;
        color: #57606a;
      }

      .preview-empty {
        color: #57606a;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-left">
          <div class="topbar-title">Markdown Vault App</div>
          <button id="newNoteButton" class="action-button">New Note</button>
          <button id="saveNoteButton" class="action-button">Save Note</button>
          <button id="loadVaultButton" class="action-button">Load Vault</button>
        </div>
        <div id="statusText" class="topbar-status status-ready">Ready</div>
      </header>

      <main class="main-layout">
        <aside class="panel">
          <div class="panel-header">Navigation</div>
          <div class="panel-body">
            <div class="nav-item active"><div class="nav-label">Vault Home</div></div>
            <div class="nav-item"><div class="nav-label">Inbox</div></div>
            <div class="nav-item"><div class="nav-label">Projects</div></div>
            <div class="nav-item"><div class="nav-label">AI Imports</div></div>
            <div class="nav-item"><div class="nav-label">Settings</div></div>
          </div>
        </aside>

        <section class="panel">
          <div class="panel-header">Notes</div>
          <div id="noteList" class="panel-body"></div>
        </section>

        <section class="workspace">
          <div class="workspace-panel">
            <div class="panel-header">Editor</div>
            <div class="workspace-body">
              <div class="editor-stack">
                <input
                  id="titleInput"
                  class="title-input"
                  type="text"
                  placeholder="Untitled note"
                />

                <textarea
                  id="bodyInput"
                  class="editor-textarea"
                  placeholder="Start writing your note..."
                ></textarea>

                <div class="helper-line">
                  The editor remains plain Markdown text. The preview below now renders real Markdown.
                </div>
              </div>
            </div>
          </div>

          <div class="workspace-panel">
            <div class="panel-header">Preview</div>
            <div class="workspace-body">
              <div class="preview-box">
                <h1 id="previewTitle" class="preview-title"></h1>
                <div id="previewBody" class="preview-markdown"></div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./node_modules/marked/lib/marked.umd.js"></script>

    <script>
      marked.use({ breaks: false });

      const titleInput = document.getElementById('titleInput');
      const bodyInput = document.getElementById('bodyInput');
      const previewTitle = document.getElementById('previewTitle');
      const previewBody = document.getElementById('previewBody');
      const statusText = document.getElementById('statusText');
      const newNoteButton = document.getElementById('newNoteButton');
      const saveNoteButton = document.getElementById('saveNoteButton');
      const loadVaultButton = document.getElementById('loadVaultButton');
      const noteList = document.getElementById('noteList');

      let notes = [
        {
          id: 1,
          title: 'Welcome to Markdown Vault App',
          body: `# Markdown Preview

This is the first true Markdown preview demo.

## Today’s progress
- The app can save notes
- The app can load notes
- The preview now renders headings, lists, and formatting

Try editing this note with **bold**, *italic*, and \`inline code\`.`,
          meta: 'Demo note'
        }
      ];

      let selectedNoteId = 1;
      let nextNoteId = 2;

      function getSelectedNote() {
        return notes.find((note) => note.id === selectedNoteId);
      }

      function setStatus(mode, message) {
        if (mode === 'draft') {
          statusText.textContent = message || 'Draft';
          statusText.className = 'topbar-status status-draft';
        } else if (mode === 'saving') {
          statusText.textContent = message || 'Saving...';
          statusText.className = 'topbar-status status-saving';
        } else if (mode === 'error') {
          statusText.textContent = message || 'Error';
          statusText.className = 'topbar-status status-error';
        } else {
          statusText.textContent = message || 'Ready';
          statusText.className = 'topbar-status status-ready';
        }
      }

      function renderPreview(note) {
        const titleValue = note.title.trim();
        const bodyValue = note.body.trim();

        previewTitle.textContent = titleValue.length === 0 ? 'Untitled note' : note.title;

        if (bodyValue.length === 0) {
          previewBody.innerHTML =
            '<div class="preview-empty">This note body is empty. Start typing in the editor.</div>';
        } else {
          previewBody.innerHTML = marked.parse(note.body);
        }
      }

      function renderEditor(note) {
        titleInput.value = note.title;
        bodyInput.value = note.body;
      }

      function renderNoteList() {
        noteList.innerHTML = '';

        notes.forEach((note) => {
          const item = document.createElement('div');
          item.className = note.id === selectedNoteId ? 'note-item active' : 'note-item';

          const displayTitle = note.title.trim().length === 0 ? 'Untitled note' : note.title;
          const bodyPreview =
            note.body.trim().length === 0
              ? 'Empty note'
              : note.body.trim().split('\n')[0].slice(0, 40);

          item.innerHTML = `
            <div class="note-title">${displayTitle}</div>
            <div class="note-meta">${note.meta || bodyPreview}</div>
          `;

          item.addEventListener('click', () => {
            selectedNoteId = note.id;
            renderApp();
            setStatus('ready', 'Ready');
          });

          noteList.appendChild(item);
        });
      }

      function renderApp() {
        const selectedNote = getSelectedNote();
        if (!selectedNote) return;
        renderNoteList();
        renderEditor(selectedNote);
        renderPreview(selectedNote);
      }

      function updateSelectedNoteFromInputs() {
        const selectedNote = getSelectedNote();
        selectedNote.title = titleInput.value;
        selectedNote.body = bodyInput.value;
        renderNoteList();
        renderPreview(selectedNote);
      }

      function handleEdit() {
        updateSelectedNoteFromInputs();
        setStatus('draft', 'Draft');
      }

      function createNewNote() {
        const newNote = {
          id: nextNoteId,
          title: 'Untitled note',
          body: '',
          meta: 'New draft'
        };

        nextNoteId += 1;
        notes.unshift(newNote);
        selectedNoteId = newNote.id;
        renderApp();
        setStatus('draft', 'Draft');
        titleInput.focus();
        titleInput.select();
      }

      async function saveCurrentNote() {
        const selectedNote = getSelectedNote();
        setStatus('saving', 'Saving...');

        const result = await window.vaultApi.saveNote({
          title: selectedNote.title,
          body: selectedNote.body
        });

        if (result.ok) {
          setStatus('ready', `Saved: ${result.fileName}`);
        } else {
          setStatus('error', `Save failed: ${result.error}`);
        }
      }

      async function loadVaultNotes() {
        setStatus('saving', 'Loading vault...');

        const result = await window.vaultApi.loadVaultNotes();

        if (!result.ok) {
          setStatus('error', `Load failed: ${result.error}`);
          return;
        }

        if (result.notes.length === 0) {
          notes = [
            {
              id: 1,
              title: 'Untitled note',
              body: '',
              meta: 'Vault is empty'
            }
          ];
          selectedNoteId = 1;
          nextNoteId = 2;
          renderApp();
          setStatus('ready', 'Vault loaded: 0 notes');
          return;
        }

        notes = result.notes;
        selectedNoteId = notes[0].id;
        nextNoteId = Math.max(...notes.map((note) => note.id)) + 1;
        renderApp();
        setStatus('ready', `Vault loaded: ${notes.length} note(s)`);
      }

      titleInput.addEventListener('input', handleEdit);
      bodyInput.addEventListener('input', handleEdit);
      newNoteButton.addEventListener('click', createNewNote);
      saveNoteButton.addEventListener('click', saveCurrentNote);
      loadVaultButton.addEventListener('click', loadVaultNotes);

      renderApp();
      setStatus('ready', 'Ready');
    </script>
  </body>
</html>
